<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: 'Arial', sans-serif;
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  color: white;
  touch-action: none;
}
#gameCanvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 1000;
  cursor: default;
  touch-action: none;
}

/* ========== 手机版自适应样式 ========== */
@media (max-width: 768px) {
  .touch-btn {
    width: 50px;
    height: 50px;
    font-size: 14px;
  }
  #joystick-area {
    width: 110px;
    height: 110px;
  }
  #joystick-base {
    width: 110px;
    height: 110px;
  }
  #joystick-knob {
    width: 42px;
    height: 42px;
    top: 34px;
    left: 34px;
  }
  #toggle-joystick, #toggle-panel {
    width: 38px;
    height: 38px;
    font-size: 18px;
  }
  #touch-hint {
    font-size: 9px;
    white-space: nowrap;
  }
  #btn-area {
    gap: 8px;
  }
}

/* ========== 触屏控制样式 ========== */
#touch-controls {
  display: block;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 220px;
  z-index: 3000;
  pointer-events: none;
  user-select: none;
}
#touch-controls.hidden { display: none; }

/* 虚拟摇杆 */
#joystick-area {
  position: absolute;
  bottom: 20px; left: 20px;
  width: 140px; height: 140px;
  pointer-events: all;
}
#joystick-area.hidden { display: none; }
#joystick-base {
  position: absolute;
  width: 140px; height: 140px;
  border-radius: 50%;
  background: rgba(255,255,255,0.12);
  border: 2px solid rgba(255,255,255,0.3);
}
#joystick-knob {
  position: absolute;
  width: 54px; height: 54px;
  border-radius: 50%;
  background: rgba(255,255,255,0.45);
  border: 2px solid rgba(255,255,255,0.7);
  top: 43px; left: 43px;
  transition: none;
  pointer-events: none;
}

/* 右侧按钮区域 */
#btn-area {
  position: absolute;
  bottom: 20px; right: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  align-items: flex-end;
  pointer-events: all;
}
.touch-btn {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: bold;
  color: white;
  border: 2px solid rgba(255,255,255,0.5);
  cursor: pointer;
  pointer-events: all;
  user-select: none;
  transition: transform 0.08s, opacity 0.08s;
}
.touch-btn:active { transform: scale(0.88); opacity: 0.7; }
#btn-space { background: rgba(100,200,100,0.55); }
#btn-r     { background: rgba(180,80,180,0.55); }
#btn-esc   { background: rgba(200,60,60,0.55); }

/* 切换按钮 */
#toggle-joystick {
  position: absolute;
  bottom: 20px;
  left: 180px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(0,0,0,0.5);
  border: 2px solid rgba(255,255,255,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  cursor: pointer;
  pointer-events: all;
  z-index: 3001;
}
#toggle-joystick:active { transform: scale(0.9); }
#toggle-joystick.hidden-mode { background: rgba(0,150,0,0.5); border-color: #0f0; }

#toggle-panel {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(0,0,0,0.6);
  border: 2px solid rgba(255,255,255,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  cursor: pointer;
  pointer-events: all;
  z-index: 3100;
}

/* 提示信息 */
#touch-hint {
  position: fixed;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.6);
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 11px;
  color: #aaa;
  pointer-events: none;
  z-index: 3001;
  white-space: nowrap;
}

/* 原有面板样式 - 提升z-index并添加触摸拦截 */
/* 所有模态面板统一使用全屏覆盖背景 */
.modal-panel {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.75);
  backdrop-filter: blur(3px);
  z-index: 5000;
  display: none;
  align-items: center;
  justify-content: center;
  pointer-events: auto;
}
.modal-panel > .panel-content {
  background: rgba(20, 30, 40, 0.95);
  border-radius: 20px;
  padding: 30px;
  color: white;
  min-width: 280px;
  max-width: 90%;
  text-align: center;
  border: 1px solid rgba(255,215,0,0.5);
  box-shadow: 0 0 30px rgba(0,0,0,0.5);
  pointer-events: auto;
}
.modal-panel h2 { margin-bottom: 15px; color: #ffd700; }
.modal-panel input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  background: #1e2a3a;
  border: 1px solid #ffd700;
  color: white;
  border-radius: 10px;
  font-size: 16px;
}
.modal-panel button {
  background: #2c3e50;
  border: none;
  padding: 10px 20px;
  margin: 8px;
  border-radius: 30px;
  color: white;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}
.modal-panel button.cancel { background: #c0392b; }
.modal-panel button:hover { opacity: 0.8; }

/* 横屏提示 */

canvas {

      ProbabilityCalculator, CraftAnimation

    // ========== 物品管理函数 ==========

    window.handleExportItems = () => {
    const game = window.gameInstance;
    if (!game || !game.player) {
        alert("请先进入游戏！");

    }

    const player = game.player;

function convertName(oldName) {
    // 先查映射表
    if (nameMapping[oldName]) return nameMapping[oldName];

    // 清理多余空格
    let cleaned = oldName.replace(/\s+/g, ' ').trim();

    // 如果是驼峰命名（没有空格），尝试转换
    if (!cleaned.includes(' ')) {
        cleaned = cleaned.replace(/([a-z])([A-Z])/g, '$1 $2');
        cleaned = cleaned.replace(/([A-Z])([A-Z][a-z])/g, '$1 $2');
        cleaned = cleaned.replace(/\s+/g, ' ');
    }

    // 分割单词，每个单词首字母大写
    let words = cleaned.split(' ');
    words = words.map(word => {
        // 特殊处理：egg → Egg
        if (word.toLowerCase() === 'egg') return 'Egg';
        // 其他单词首字母大写
        return word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
    });

    return words.join(' ');
}

    // ========== 导出时转换名称 ==========
    const allItems = {
        inventory: player.inventory.items.map(item => ({
            type: convertName(item.type),  // ✅ 转换
            rarity: item.rarity,
            level: item.level,
            count: item.count,
            durability: item.durability,
            maxDurability: item.maxDurability,

            const bw = 200, bh = 50, bx = screen.width/2 - bw/2;
            ctx.fillRect(bx, b.y, bw, bh);
            ctx.strokeStyle = b.color ? '#CD853F' : '#6a6a8a';
            ctx.strokeRect(bx, b.y, bw, bh);
            drawButtonTextWithBorder(ctx, b.text, bx, b.y, bw, bh, { font: 'bold 20px "Arial", sans-serif', fillColor: b.text === 'MAZE MODE' ? '#FFD700' : 'white', borderWidth: 2 });
        });
    }

    function drawTextWithBorder(ctx, txt, x, y, opt = {}) {
        const { font='24px Arial', align='center', baseline='middle', border='black', bw=3, fill='white' } = opt;
        ctx.save();
        ctx.font = font; ctx.textAlign = align; ctx.textBaseline = baseline;
        ctx.shadowColor = border; ctx.shadowBlur = bw;
        ctx.fillStyle = fill; ctx.fillText(txt, x, y);
        ctx.shadowBlur = 0; ctx.fillText(txt, x, y);
        ctx.restore();
    }
    function drawButtonTextWithBorder(ctx, txt, x, y, w, h, opt = {}) {
        drawTextWithBorder(ctx, txt, x+w/2, y+h/2, { font: opt.font || 'bold 20px Arial', align: 'center', baseline: 'middle', border: opt.borderColor || 'black', bw: opt.borderWidth || 3, fill: opt.fillColor || 'white' });
    }

    // 启动游戏
    initDOMElements();
    resizeCanvas();
    checkOrientation();
    gameInstance = createGameInstance();
    gameLoop();
    initializePlayerControls();

    document.addEventListener('keydown', handleKeyDown);
    document.addEventListener('keyup', handleKeyUp);

    document.getElementById('orientation-tip')?.addEventListener('click', () => {
        document.getElementById('orientation-tip').classList.add('hidden');
    });

    // UI 函数
    window.showMultiplayerPanel = () => {
        const panel = document.getElementById('multiplayer-panel');
        if (panel) panel.style.display = 'flex';
        const menu = document.getElementById('mp-menu');
        if (menu) menu.style.display = 'block';
        const createDiv = document.getElementById('mp-create');
        if (createDiv) createDiv.style.display = 'none';
        const joinDiv = document.getElementById('mp-join');
        if (joinDiv) joinDiv.style.display = 'none';
    };
    window.hideMultiplayerPanel = () => {
        const panel = document.getElementById('multiplayer-panel');
        if (panel) panel.style.display = 'none';
    };
    window.showCreateRoom = async () => {
        const menu = document.getElementById('mp-menu');
        if (menu) menu.style.display = 'none';
        const createDiv = document.getElementById('mp-create');
        if (createDiv) createDiv.style.display = 'block';
        if (!gameInstance) gameInstance = createGameInstance();
        try {
            const code = await gameInstance.createMultiplayerRoom();
            const codeDisplay = document.getElementById('room-code-display');
            if (codeDisplay) codeDisplay.textContent = code;
            const linkDisplay = document.getElementById('room-link-display');
            if (linkDisplay) linkDisplay.textContent = `${location.href.split('?')[0]}?room=${code}`;
            const ri = document.getElementById('room-info');
            if (ri) { ri.style.display = 'block'; ri.innerHTML = `🎮 房间: ${code} | 等待玩家加入...`; }
        } catch(e) { alert('创建房间失败: ' + e.message); backToMenu(); }
    };
    window.showJoinRoom = () => {
        const menu = document.getElementById('mp-menu');
        if (menu) menu.style.display = 'none';
        const joinDiv = document.getElementById('mp-join');
        if (joinDiv) joinDiv.style.display = 'block';
        const input = document.getElementById('room-code-input');
        if (input) input.focus();
    };
    window.backToMenu = () => {
        const menu = document.getElementById('mp-menu');
        if (menu) menu.style.display = 'block';
        const createDiv = document.getElementById('mp-create');
        if (createDiv) createDiv.style.display = 'none';
        const joinDiv = document.getElementById('mp-join');
        if (joinDiv) joinDiv.style.display = 'none';
        const errorMsg = document.getElementById('join-error');
        if (errorMsg) errorMsg.textContent = '';
    };
    window.copyRoomLink = () => {
        const linkDisplay = document.getElementById('room-link-display');
        if (linkDisplay) {
            navigator.clipboard.writeText(linkDisplay.textContent);
            alert('✅ 链接已复制！');
        }
    };
    window.joinRoom = async () => {
        const codeInput = document.getElementById('room-code-input');
        const code = codeInput ? codeInput.value.toUpperCase() : '';
        if (code.length < 4) {
            const errorMsg = document.getElementById('join-error');
            if (errorMsg) errorMsg.textContent = '请输入有效的房间号';
            return;
        }
        if (!gameInstance) gameInstance = createGameInstance();
        try {
            await gameInstance.joinMultiplayerRoom(code);
            hideMultiplayerPanel();
            const ri = document.getElementById('room-info');
            if (ri) { ri.style.display = 'block'; ri.innerHTML = `🎮 房间: ${code} | 已加入`; }
            startGame('Plain');
        } catch(e) {
            const errorMsg = document.getElementById('join-error');
            if (errorMsg) errorMsg.textContent = '加入失败: ' + e.message;
        }
    };

    window.showAccountPanel = () => {
        const panel = document.getElementById('account-panel');
        if (panel) panel.style.display = 'flex';
        const menu = document.getElementById('account-menu');
        if (menu) menu.style.display = 'block';
        const login = document.getElementById('account-login');
        if (login) login.style.display = 'none';
        const register = document.getElementById('account-register');
        if (register) register.style.display = 'none';
        const loggedin = document.getElementById('account-loggedin');
        if (loggedin) loggedin.style.display = 'none';
        clearAccountMessages();
        if(gameInstance?.accountSystem?.isLoggedIn()) showLoggedInStatus();
    };
    window.hideAccountPanel = () => {
        const panel = document.getElementById('account-panel');
        if (panel) panel.style.display = 'none';
        clearAccountMessages();
    };
    window.showAccountLogin = () => {
        const menu = document.getElementById('account-menu');
        if (menu) menu.style.display = 'none';
        const login = document.getElementById('account-login');
        if (login) login.style.display = 'block';
        const register = document.getElementById('account-register');
        if (register) register.style.display = 'none';
        const loggedin = document.getElementById('account-loggedin');
        if (loggedin) loggedin.style.display = 'none';
        clearAccountMessages();
        const username = document.getElementById('login-username');
        if (username) username.value = '';
        const password = document.getElementById('login-password');
        if (password) password.value = '';
        setTimeout(() => document.getElementById('login-username')?.focus(), 100);
    };
    window.showAccountRegister = () => {
        const menu = document.getElementById('account-menu');
        if (menu) menu.style.display = 'none';
        const login = document.getElementById('account-login');
        if (login) login.style.display = 'none';
        const register = document.getElementById('account-register');
        if (register) register.style.display = 'block';
        const loggedin = document.getElementById('account-loggedin');
        if (loggedin) loggedin.style.display = 'none';
        clearAccountMessages();
        const regUsername = document.getElementById('register-username');
        if (regUsername) regUsername.value = '';
        const regPassword = document.getElementById('register-password');
        if (regPassword) regPassword.value = '';
        const regConfirm = document.getElementById('register-confirm');
        if (regConfirm) regConfirm.value = '';
        setTimeout(() => document.getElementById('register-username')?.focus(), 100);
    };
    window.backToAccountMenu = () => {
        const menu = document.getElementById('account-menu');
        if (menu) menu.style.display = 'block';
        const login = document.getElementById('account-login');
        if (login) login.style.display = 'none';
        const register = document.getElementById('account-register');
        if (register) register.style.display = 'none';
        const loggedin = document.getElementById('account-loggedin');
        if (loggedin) loggedin.style.display = 'none';
        clearAccountMessages();
    };
    window.showLoggedInStatus = () => {
        if (!gameInstance?.accountSystem) return;
        const un = gameInstance.accountSystem.getCurrentUser();
        const loggedinUsername = document.getElementById('loggedin-username');
        if (loggedinUsername) loggedinUsername.textContent = un;

        const accountMenu = document.getElementById('account-menu');
        if (accountMenu) accountMenu.style.display = 'none';
        const accountLogin = document.getElementById('account-login');
        if (accountLogin) accountLogin.style.display = 'none';
        const accountRegister = document.getElementById('account-register');
        if (accountRegister) accountRegister.style.display = 'none';
        const accountLoggedin = document.getElementById('account-loggedin');
        if (accountLoggedin) accountLoggedin.style.display = 'block';

        const currentUser = document.getElementById('current-user');
        if (currentUser) {
            currentUser.style.display = 'block';
            currentUser.innerHTML = `👤 ${un}`;
        }
    };
    window.handleLogin = () => {
        const un = document.getElementById('login-username')?.value.trim() || '';
        const pw = document.getElementById('login-password')?.value.trim() || '';
        if (!un || !pw) { showAccountMessage('login-message', '请输入用户名和密码', 'error'); return; }
        if (!gameInstance?.accountSystem) { showAccountMessage('login-message', '游戏系统未初始化', 'error'); return; }
        const res = gameInstance.accountSystem.login(un, pw);
        if (res.success) {
            showAccountMessage('login-message', '登录成功！', 'success');
            if (res.gameData) gameInstance.accountSystem.applyGameData(gameInstance.player, res.gameData);
            setTimeout(() => { hideAccountPanel(); showLoggedInStatus(); }, 1500);
        } else showAccountMessage('login-message', res.message, 'error');
    };
    window.handleRegister = () => {
        const un = document.getElementById('register-username')?.value.trim() || '';
        const pw = document.getElementById('register-password')?.value.trim() || '';
        const cf = document.getElementById('register-confirm')?.value.trim() || '';
        if (!un || !pw || !cf) { showAccountMessage('register-message', '请填写所有字段', 'error'); return; }
        if (pw !== cf) { showAccountMessage('register-message', '两次输入的密码不一致', 'error'); return; }
        if (un.length < 3 || un.length > 20) { showAccountMessage('register-message', '用户名长度必须在3-20字符之间', 'error'); return; }
        if (pw.length < 3 || pw.length > 20) { showAccountMessage('register-message', '密码长度必须在3-20字符之间', 'error'); return; }
        if (!gameInstance?.accountSystem) { showAccountMessage('register-message', '游戏系统未初始化', 'error'); return; }
        const res = gameInstance.accountSystem.createAccount(un, pw);
        if (res.success) {
            showAccountMessage('register-message', '注册成功！请登录', 'success');
            setTimeout(() => showAccountLogin(), 1500);
        } else showAccountMessage('register-message', res.message, 'error');
    };
    window.handleLogout = () => {
        if (!gameInstance?.accountSystem) return;
        gameInstance.accountSystem.logout();
        const currentUser = document.getElementById('current-user');
        if (currentUser) currentUser.style.display = 'none';
        backToAccountMenu();
        showAccountMessage('login-message', '已登出', 'success');
    };
    function showAccountMessage(eid, msg, type) {
        const el = document.getElementById(eid);
        if (!el) return;
        el.textContent = msg;
        el.className = `message ${type}`;
        el.style.display = 'block';
        setTimeout(() => { if (el) el.style.display = 'none'; }, 3000);
    }
    function clearAccountMessages() {
        const lm = document.getElementById('login-message');
        const rm = document.getElementById('register-message');
        if (lm) { lm.style.display = 'none'; lm.textContent = ''; }
        if (rm) { rm.style.display = 'none'; rm.textContent = ''; }
    }
    </script>
</body>
</html>
