<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Flwrr - 花瓣游戏</title>
<!-- 添加 PeerJS 用于 WebRTC 连接 -->
<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: 'Arial', sans-serif;
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  color: white;
  touch-action: none; /* 防止触摸时页面滚动/缩放 */
}
#gameCanvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 1000;
  cursor: default;
  touch-action: none;
}
/* 左下角切换按钮 */
#toggle-joystick {
  position: absolute;
  bottom: 20px;
  left: 180px;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: rgba(0,0,0,0.5);
  border: 2px solid rgba(255,255,255,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  cursor: pointer;
  pointer-events: all;
  z-index: 3001;
  transition: 0.1s;
}
#toggle-joystick:active {
  transform: scale(0.9);
  background: rgba(0,0,0,0.7);
}

/* 摇杆隐藏状态 */
#joystick-area.hidden {
  display: none;
}
#toggle-joystick.hidden-mode {
  background: rgba(0,150,0,0.5);
  border-color: #0f0;
}
/* ========== 触屏控制样式 ========== */
#touch-controls {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 220px;
  z-index: 3000;
  pointer-events: none;
  user-select: none;
}
@media (pointer: coarse) {
  #touch-controls { display: block; }
}

/* 虚拟摇杆 */
#joystick-area {
  position: absolute;
  bottom: 20px; left: 20px;
  width: 140px; height: 140px;
  pointer-events: all;
}
#joystick-base {
  position: absolute;
  width: 140px; height: 140px;
  border-radius: 50%;
  background: rgba(255,255,255,0.12);
  border: 2px solid rgba(255,255,255,0.3);
}
#joystick-knob {
  position: absolute;
  width: 54px; height: 54px;
  border-radius: 50%;
  background: rgba(255,255,255,0.45);
  border: 2px solid rgba(255,255,255,0.7);
  top: 43px; left: 43px;
  transition: none;
  pointer-events: none;
}

/* 右侧按钮区域 */
#btn-area {
  position: absolute;
  bottom: 20px; right: 20px;
  width: 220px; height: 160px;
  pointer-events: all;
}
.touch-btn {
  position: absolute;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: bold; color: white;
  border: 2px solid rgba(255,255,255,0.5);
  cursor: pointer;
  pointer-events: all;
  user-select: none;
  transition: transform 0.08s, opacity 0.08s;
}
.touch-btn:active { transform: scale(0.88); opacity: 0.7; }

#btn-space { width:64px;height:64px; background:rgba(100,200,100,0.55); bottom:10px; right:78px; font-size:13px; }
#btn-c     { width:50px;height:50px; background:rgba(80,130,220,0.55);  bottom:74px; right:0;    }
#btn-i     { width:50px;height:50px; background:rgba(200,160,60,0.55);  bottom:74px; right:60px; }
#btn-r     { width:50px;height:50px; background:rgba(180,80,180,0.55);  bottom:10px; right:0;    }
#btn-esc   { width:42px;height:42px; background:rgba(200,60,60,0.55);   bottom:116px;right:0;    font-size:13px; }
#btn-p     { width:42px;height:42px; background:rgba(120,120,120,0.55); bottom:116px;right:52px; }

/* 提示信息 */
#touch-hint {
  position: fixed;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.6);
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 11px;
  color: #aaa;
  pointer-events: none;
  z-index: 3001;
  white-space: nowrap;
}
@media (pointer: fine) {
  #touch-hint { display: none; }
}

/* 原有面板样式保持不变 */
#multiplayer-panel, #account-panel {
  /* 保持原有样式 */
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(20, 30, 40, 0.95);
  border-radius: 10px;
  padding: 30px;
  color: white;
  z-index: 2000;
  display: none;
  min-width: 400px;
  text-align: center;
}
#multiplayer-panel { border: 2px solid #00a8ff; box-shadow: 0 0 30px rgba(0, 168, 255, 0.5); }
#account-panel { border: 2px solid #f1c40f; box-shadow: 0 0 30px rgba(241, 196, 15, 0.5); }
#multiplayer-panel h2 { color: #00a8ff; }
#account-panel h2 { color: #f1c40f; }
#multiplayer-panel input, #account-panel input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  background: #1a2a3a;
  border: 1px solid #00a8ff;
  color: white;
  border-radius: 5px;
  font-size: 18px;
}
#account-panel input { border-color: #f1c40f; }
#multiplayer-panel button, #account-panel button {
  background: #00a8ff;
  color: white;
  border: none;
  padding: 12px 24px;
  margin: 10px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 16px;
  min-width: 150px;
  transition: 0.3s;
}
#account-panel button { background: #f1c40f; color: black; font-weight: bold; }
#multiplayer-panel button.cancel, #account-panel button.cancel { background: #e74c3c; color: white; }
#room-info {
  position: fixed;
  top: 10px;
  right: 10px;
  color: #00ff00;
  font-size: 14px;
  z-index: 1001;
  background: rgba(0,0,0,0.7);
  padding: 8px 15px;
  border-radius: 20px;
  border: 1px solid #00ff00;
  pointer-events: none;
}
#current-user {
  position: fixed;
  top: 10px;
  left: 10px;
  color: #f1c40f;
  font-size: 14px;
  z-index: 1001;
  background: rgba(0,0,0,0.7);
  padding: 8px 15px;
  border-radius: 20px;
  border: 1px solid #f1c40f;
  pointer-events: none;
  display: none;
}
</style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <!-- 房间信息显示 -->
    <div id="room-info" style="display: none;"></div>
    <div id="current-user" style="display: none;"></div>

    <!-- 触屏控制 -->
    <div id="touch-controls">
      <div id="joystick-area">
        <div id="joystick-base"></div>
        <div id="joystick-knob"></div>
      </div>
      <div id="btn-area">
        <div class="touch-btn" id="btn-space">⚔️</div>
        <div class="touch-btn" id="btn-c">🔧</div>
        <div class="touch-btn" id="btn-i">🎒</div>
        <div class="touch-btn" id="btn-r">🔄</div>
        <div class="touch-btn" id="btn-esc">🏠</div>
        <div class="touch-btn" id="btn-p">⏸️</div>
      </div>
    </div>
    <div id="touch-hint">💡 左键摇杆移动 | 点击地面移动 | 右侧按钮快捷操作</div>

    <!-- 多人游戏面板 -->
    <div id="multiplayer-panel">
        <h2>👥 多人游戏</h2>
        <div id="mp-menu">
            <button onclick="showCreateRoom()">🎮 创建房间</button>
            <button onclick="showJoinRoom()">🔑 加入房间</button>
            <button class="cancel" onclick="hideMultiplayerPanel()">❌ 返回</button>
        </div>
        <div id="mp-create" style="display: none;">
            <h3>创建房间</h3>
            <div id="room-code-display" class="room-code">------</div>
            <div id="room-link-display" class="link-box"></div>
            <button onclick="copyRoomLink()">📋 复制链接</button>
            <button class="cancel" onclick="backToMenu()">↩️ 返回</button>
        </div>
        <div id="mp-join" style="display: none;">
            <h3>加入房间</h3>
            <input type="text" id="room-code-input" placeholder="输入6位房间号" maxlength="6" autocomplete="off">
            <button onclick="joinRoom()">✅ 加入</button>
            <button class="cancel" onclick="backToMenu()">↩️ 返回</button>
            <p id="join-error" style="color: #ff6b6b; margin-top: 10px;"></p>
        </div>
    </div>

    <!-- 账号面板 -->
    <div id="account-panel">
        <h2>👤 账号系统</h2>
        <div id="account-menu">
            <button onclick="showAccountLogin()">🔑 登录</button>
            <button onclick="showAccountRegister()">📝 注册</button>
            <button class="cancel" onclick="hideAccountPanel()">❌ 关闭</button>
        </div>
        <div id="account-login" style="display: none;">
            <h3>登录</h3>
            <div class="input-label">用户名</div>
            <input type="text" id="login-username" placeholder="输入用户名" maxlength="20" autocomplete="off">
            <div class="input-label">密码</div>
            <div style="position: relative;">
                <input type="password" id="login-password" placeholder="输入密码" maxlength="20" style="width: 100%; padding-right: 40px;">
                <span onclick="togglePasswordVisibility('login-password')" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #f1c40f; font-size: 20px;">👁️</span>
            </div>
            <button onclick="handleLogin()">✅ 登录</button>
            <button class="cancel" onclick="backToAccountMenu()">↩️ 返回</button>
            <div id="login-message" class="message" style="display: none;"></div>
        </div>
        <div id="account-register" style="display: none;">
            <h3>注册新账号</h3>
            <div class="input-label">用户名 (3-20字符)</div>
            <input type="text" id="register-username" placeholder="输入用户名" maxlength="20" autocomplete="off">
            <div class="input-label">密码 (3-20字符)</div>
            <div style="position: relative;">
                <input type="password" id="register-password" placeholder="输入密码" maxlength="20" style="width: 100%; padding-right: 40px;">
                <span onclick="togglePasswordVisibility('register-password')" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #f1c40f; font-size: 20px;">👁️</span>
            </div>
            <div class="input-label">确认密码</div>
            <div style="position: relative;">
                <input type="password" id="register-confirm" placeholder="再次输入密码" maxlength="20" style="width: 100%; padding-right: 40px;">
                <span onclick="togglePasswordVisibility('register-confirm')" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #f1c40f; font-size: 20px;">👁️</span>
            </div>
            <button onclick="handleRegister()">📝 注册</button>
            <button class="cancel" onclick="backToAccountMenu()">↩️ 返回</button>
            <div id="register-message" class="message" style="display: none;"></div>
        </div>
        <div id="account-loggedin" style="display: none;">
            <h3>已登录</h3>
            <div id="loggedin-username" style="font-size: 24px; margin: 20px; color: #f1c40f;"></div>
            <button onclick="handleLogout()">🚪 登出</button>
            <button class="cancel" onclick="hideAccountPanel()">❌ 关闭</button>
        </div>
    </div>

    <script type="module">
    // ==================== 导入 game.js 模块 ====================
    import {
      QuickSlot, Item, Inventory, StarCraftUI, RARITY_LIST, RARITY_COLORS,
      ARMOR_ELIGIBLE_ITEMS, ITEM_ARMOR_VALUES, WorldMapGame, ImageLoader,
      ProbabilityCalculator, CraftAnimation
    } from './game.js';

    // ===== 全局变量 =====
    let screen = null;
    let ctx = null;
    let gameState = 'main_menu';
    let gameInstance = null;
    let controlsInitialized = false;
    let animationFrameId = null;
    const GameState = { MAIN_MENU: 'main_menu', IN_GAME: 'in_game', PAUSED: 'paused', GAME_OVER: 'game_over' };

    let mouseTargetX = null, mouseTargetY = null, isMouseMoving = false;
    const MOUSE_MOVE_SPEED = 5;
    let editorMode = false;

    const imageLoader = ImageLoader.getInstance();
    window.imageLoader = imageLoader;
    window.RARITY_LIST = RARITY_LIST;
    window.RARITY_COLORS = RARITY_COLORS;
    window.WIDTH = window.innerWidth;
    window.HEIGHT = window.innerHeight;

    // ===== 触屏控制脚本（内联）=====
    (function() {
      if (!('ontouchstart' in window) && !navigator.maxTouchPoints) return;

      const joystickArea = document.getElementById('joystick-area');
      const knob = document.getElementById('joystick-knob');
      const BASE_R = 70, KNOB_R = 27, CENTER = BASE_R;
      let joystickActive = false, joystickId = null, joyX = 0, joyY = 0;

      function updateKnob(dx, dy) {
        const dist = Math.sqrt(dx*dx + dy*dy);
        const maxDist = BASE_R - KNOB_R;
        const clampedDist = Math.min(dist, maxDist);
        const angle = Math.atan2(dy, dx);
        const nx = Math.cos(angle) * clampedDist;
        const ny = Math.sin(angle) * clampedDist;
        knob.style.left = (CENTER + nx - KNOB_R) + 'px';
        knob.style.top = (CENTER + ny - KNOB_R) + 'px';
        joyX = dist > 5 ? Math.cos(angle) : 0;
        joyY = dist > 5 ? Math.sin(angle) : 0;
      }
      function resetKnob() {
        knob.style.left = (CENTER - KNOB_R) + 'px';
        knob.style.top = (CENTER - KNOB_R) + 'px';
        joyX = 0; joyY = 0;
      }
      joystickArea.addEventListener('touchstart', e => {
        e.preventDefault();
        const t = e.changedTouches[0];
        joystickId = t.identifier;
        joystickActive = true;
        const rect = joystickArea.getBoundingClientRect();
        updateKnob(t.clientX - rect.left - CENTER, t.clientY - rect.top - CENTER);
      }, { passive: false });
      joystickArea.addEventListener('touchmove', e => {
        e.preventDefault();
        for (const t of e.changedTouches) {
          if (t.identifier === joystickId) {
            const rect = joystickArea.getBoundingClientRect();
            updateKnob(t.clientX - rect.left - CENTER, t.clientY - rect.top - CENTER);
          }
        }
      }, { passive: false });
      joystickArea.addEventListener('touchend', e => {
        e.preventDefault();
        for (const t of e.changedTouches) {
          if (t.identifier === joystickId) {
            joystickActive = false;
            joystickId = null;
            resetKnob();
          }
        }
      }, { passive: false });

      function updateMovement() {
        if (!joystickActive || (Math.abs(joyX) < 0.1 && Math.abs(joyY) < 0.1)) {
          requestAnimationFrame(updateMovement);
          return;
        }
        const game = window.gameInstance;
        if (game && game.player && game.player.physicsBody) {
          const p = game.player;
          const speed = p.speed || 80;
          const dt = 16.67 / 1000;
          p.physicsBody.position.x += joyX * speed * dt * 60;
          p.physicsBody.position.y += joyY * speed * dt * 60;
          const worldWidth = window.WORLD_WIDTH || 10000;
          const worldHeight = window.WORLD_HEIGHT || 10000;
          p.physicsBody.position.x = Math.max(30, Math.min(worldWidth - 30, p.physicsBody.position.x));
          p.physicsBody.position.y = Math.max(30, Math.min(worldHeight - 30, p.physicsBody.position.y));
          if (game.cameraOffset) {
            game.cameraOffset.x = p.physicsBody.position.x - window.WIDTH / 2;
            game.cameraOffset.y = p.physicsBody.position.y - window.HEIGHT / 2;
          }
        }
        requestAnimationFrame(updateMovement);
      }
      updateMovement();

      function bindBtn(id, fn) {
        const el = document.getElementById(id);
        if (!el) return;
        el.addEventListener('touchstart', e => { e.preventDefault(); fn(); }, { passive: false });
      }
      function fakeKey(key) {
        const e = new KeyboardEvent('keydown', { key, bubbles: true });
        document.dispatchEvent(e);
      }
      bindBtn('btn-space', () => {
        const game = window.gameInstance;
        if (game && game.player && game.player.toggleSpreadMode) game.player.toggleSpreadMode();
      });
      bindBtn('btn-c', () => fakeKey('c'));
      bindBtn('btn-i', () => fakeKey('i'));
      bindBtn('btn-r', () => {
        const game = window.gameInstance;
        if (game && game.player && game.player.quickSlot && game.player.quickSlot.swapAllSlots) {
          game.player.quickSlot.swapAllSlots();
        } else fakeKey('r');
      });
      bindBtn('btn-p', () => fakeKey('p'));
      bindBtn('btn-esc', () => {
        const game = window.gameInstance;
        if (game && game.returnToMainMenu) game.returnToMainMenu();
        else fakeKey('Escape');
      });

      const canvas = document.getElementById('gameCanvas');
      if (canvas) {
        canvas.addEventListener('touchstart', e => {
          const t = e.touches[0];
          const rect = canvas.getBoundingClientRect();
          const scaleX = canvas.width / rect.width;
          const scaleY = canvas.height / rect.height;
          const x = (t.clientX - rect.left) * scaleX;
          const y = (t.clientY - rect.top) * scaleY;
          const joystickRect = joystickArea.getBoundingClientRect();
          const btnRect = document.getElementById('btn-area').getBoundingClientRect();
          if (t.clientX < joystickRect.right && t.clientY > joystickRect.top) return;
          if (t.clientX > btnRect.left && t.clientY > btnRect.top) return;
          if (window.gameInstance && window.gameInstance.player && window.gameInstance.player.quickSlot) {
            if (window.gameInstance.player.quickSlot.handleClick([x, y])) return;
          }
          const fakeMouse = new MouseEvent('mousedown', { button: 2, clientX: t.clientX, clientY: t.clientY, bubbles: true });
          canvas.dispatchEvent(fakeMouse);
        }, { passive: false });
        canvas.addEventListener('touchend', e => e.preventDefault(), { passive: false });
      }
    })();

    // ===== URL参数解析 =====
    (function() {
      try {
        const urlParams = new URLSearchParams(window.location.search);
        window.URL_PARAMS = { roomCode: urlParams.get('room') };
        console.log('📋 URL参数:', window.URL_PARAMS);
      } catch (e) {
        window.URL_PARAMS = { roomCode: null };
      }
    })();

    window.togglePasswordVisibility = function(inputId) {
      const input = document.getElementById(inputId);
      if (input) input.type = input.type === 'password' ? 'text' : 'password';
    };

    // ===== 多人游戏面板控制 =====
    window.showMultiplayerPanel = function() {
      const panel = document.getElementById('multiplayer-panel');
      if (panel) panel.style.display = 'block';
      document.getElementById('mp-menu').style.display = 'block';
      document.getElementById('mp-create').style.display = 'none';
      document.getElementById('mp-join').style.display = 'none';
    };
    window.hideMultiplayerPanel = function() {
      document.getElementById('multiplayer-panel').style.display = 'none';
    };
    window.showCreateRoom = async function() {
      document.getElementById('mp-menu').style.display = 'none';
      document.getElementById('mp-create').style.display = 'block';
      if (!gameInstance) gameInstance = createGameInstance();
      try {
        const roomCode = await gameInstance.createMultiplayerRoom();
        document.getElementById('room-code-display').textContent = roomCode;
        const baseUrl = window.location.href.split('?')[0];
        document.getElementById('room-link-display').textContent = `${baseUrl}?room=${roomCode}`;
        const roomInfo = document.getElementById('room-info');
        if (roomInfo) {
          roomInfo.style.display = 'block';
          roomInfo.innerHTML = `🎮 房间: ${roomCode} | 等待玩家加入...`;
        }
      } catch (error) {
        alert('创建房间失败: ' + error.message);
        backToMenu();
      }
    };
    window.showJoinRoom = function() {
      document.getElementById('mp-menu').style.display = 'none';
      document.getElementById('mp-join').style.display = 'block';
      document.getElementById('room-code-input').focus();
    };
    window.backToMenu = function() {
      document.getElementById('mp-menu').style.display = 'block';
      document.getElementById('mp-create').style.display = 'none';
      document.getElementById('mp-join').style.display = 'none';
      document.getElementById('join-error').textContent = '';
    };
    window.copyRoomLink = function() {
      const link = document.getElementById('room-link-display').textContent;
      navigator.clipboard.writeText(link);
      alert('✅ 链接已复制到剪贴板！');
    };
    window.joinRoom = async function() {
      const roomCode = document.getElementById('room-code-input').value.toUpperCase();
      if (roomCode.length < 4) {
        document.getElementById('join-error').textContent = '请输入有效的房间号';
        return;
      }
      if (!gameInstance) gameInstance = createGameInstance();
      try {
        await gameInstance.joinMultiplayerRoom(roomCode);
        hideMultiplayerPanel();
        const roomInfo = document.getElementById('room-info');
        if (roomInfo) {
          roomInfo.style.display = 'block';
          roomInfo.innerHTML = `🎮 房间: ${roomCode} | 已加入`;
        }
        startGame('Plain');
      } catch (error) {
        document.getElementById('join-error').textContent = '加入失败: ' + error.message;
      }
    };

    // ===== 账号面板控制 =====
    window.showAccountPanel = function() {
      document.getElementById('account-panel').style.display = 'block';
      document.getElementById('account-menu').style.display = 'block';
      document.getElementById('account-login').style.display = 'none';
      document.getElementById('account-register').style.display = 'none';
      document.getElementById('account-loggedin').style.display = 'none';
      clearAccountMessages();
      if (gameInstance?.accountSystem?.isLoggedIn()) showLoggedInStatus();
    };
    window.hideAccountPanel = function() {
      document.getElementById('account-panel').style.display = 'none';
      clearAccountMessages();
    };
    window.showAccountLogin = function() {
      document.getElementById('account-menu').style.display = 'none';
      document.getElementById('account-login').style.display = 'block';
      document.getElementById('account-register').style.display = 'none';
      document.getElementById('account-loggedin').style.display = 'none';
      clearAccountMessages();
      document.getElementById('login-username').value = '';
      document.getElementById('login-password').value = '';
    };
    window.showAccountRegister = function() {
      document.getElementById('account-menu').style.display = 'none';
      document.getElementById('account-login').style.display = 'none';
      document.getElementById('account-register').style.display = 'block';
      document.getElementById('account-loggedin').style.display = 'none';
      clearAccountMessages();
      document.getElementById('register-username').value = '';
      document.getElementById('register-password').value = '';
      document.getElementById('register-confirm').value = '';
    };
    window.backToAccountMenu = function() {
      document.getElementById('account-menu').style.display = 'block';
      document.getElementById('account-login').style.display = 'none';
      document.getElementById('account-register').style.display = 'none';
      document.getElementById('account-loggedin').style.display = 'none';
      clearAccountMessages();
    };
    window.showLoggedInStatus = function() {
      if (!gameInstance?.accountSystem) return;
      const username = gameInstance.accountSystem.getCurrentUser();
      document.getElementById('loggedin-username').textContent = username;
      document.getElementById('account-menu').style.display = 'none';
      document.getElementById('account-login').style.display = 'none';
      document.getElementById('account-register').style.display = 'none';
      document.getElementById('account-loggedin').style.display = 'block';
      const userDisplay = document.getElementById('current-user');
      if (userDisplay) {
        userDisplay.style.display = 'block';
        userDisplay.innerHTML = `👤 ${username}`;
      }
    };
    window.handleLogin = function() {
      const username = document.getElementById('login-username').value.trim();
      const password = document.getElementById('login-password').value.trim();
      if (!username || !password) {
        showAccountMessage('login-message', '请输入用户名和密码', 'error');
        return;
      }
      if (!gameInstance?.accountSystem) {
        showAccountMessage('login-message', '游戏系统未初始化', 'error');
        return;
      }
      const result = gameInstance.accountSystem.login(username, password);
      if (result.success) {
        showAccountMessage('login-message', '登录成功！', 'success');
        if (result.gameData) gameInstance.accountSystem.applyGameData(gameInstance.player, result.gameData);
        setTimeout(() => { hideAccountPanel(); showLoggedInStatus(); }, 1500);
      } else {
        showAccountMessage('login-message', result.message, 'error');
      }
    };
    window.handleRegister = function() {
      const username = document.getElementById('register-username').value.trim();
      const password = document.getElementById('register-password').value.trim();
      const confirm = document.getElementById('register-confirm').value.trim();
      if (!username || !password || !confirm) {
        showAccountMessage('register-message', '请填写所有字段', 'error');
        return;
      }
      if (password !== confirm) {
        showAccountMessage('register-message', '两次输入的密码不一致', 'error');
        return;
      }
      if (username.length < 3 || username.length > 20) {
        showAccountMessage('register-message', '用户名长度必须在3-20字符之间', 'error');
        return;
      }
      if (password.length < 3 || password.length > 20) {
        showAccountMessage('register-message', '密码长度必须在3-20字符之间', 'error');
        return;
      }
      if (!gameInstance?.accountSystem) {
        showAccountMessage('register-message', '游戏系统未初始化', 'error');
        return;
      }
      const result = gameInstance.accountSystem.createAccount(username, password);
      if (result.success) {
        showAccountMessage('register-message', '注册成功！请登录', 'success');
        setTimeout(() => showAccountLogin(), 1500);
      } else {
        showAccountMessage('register-message', result.message, 'error');
      }
    };
    window.handleLogout = function() {
      if (!gameInstance?.accountSystem) return;
      gameInstance.accountSystem.logout();
      document.getElementById('current-user').style.display = 'none';
      backToAccountMenu();
      showAccountMessage('login-message', '已登出', 'success');
    };
    function showAccountMessage(elementId, message, type) {
      const el = document.getElementById(elementId);
      if (!el) return;
      el.textContent = message;
      el.className = `message ${type}`;
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; }, 3000);
    }
    function clearAccountMessages() {
      const loginMsg = document.getElementById('login-message');
      const registerMsg = document.getElementById('register-message');
      if (loginMsg) { loginMsg.style.display = 'none'; loginMsg.textContent = ''; }
      if (registerMsg) { registerMsg.style.display = 'none'; registerMsg.textContent = ''; }
    }

    // ===== 辅助函数 =====
    function drawTextWithBorder(ctx, text, x, y, options = {}) {
      const { font = '24px "Arial", sans-serif', textAlign = 'center', textBaseline = 'middle', borderColor = 'black', borderWidth = 3, fillColor = 'white' } = options;
      ctx.save();
      ctx.font = font;
      ctx.textAlign = textAlign;
      ctx.textBaseline = textBaseline;
      ctx.shadowColor = borderColor;
      ctx.shadowBlur = borderWidth;
      ctx.fillStyle = fillColor;
      ctx.fillText(text, x, y);
      ctx.shadowBlur = 0;
      ctx.fillText(text, x, y);
      ctx.restore();
    }
    function drawButtonTextWithBorder(ctx, text, x, y, width, height, options = {}) {
      const { font = 'bold 20px "Arial", sans-serif', borderColor = 'black', borderWidth = 3, fillColor = 'white' } = options;
      drawTextWithBorder(ctx, text, x + width/2, y + height/2, { font, textAlign: 'center', textBaseline: 'middle', borderColor, borderWidth, fillColor });
    }

    // ===== 初始化 DOM =====
    function initDOMElements() {
      screen = document.getElementById('gameCanvas');
      if (!screen) throw new Error("❌ Canvas #gameCanvas not found!");
      screen.width = window.innerWidth;
      screen.height = window.innerHeight;
      ctx = screen.getContext('2d');
      window.WIDTH = screen.width;
      window.HEIGHT = screen.height;
    }

    // ===== 创建游戏实例 =====
    function createGameInstance() {
      try {
        const game = new WorldMapGame();
        gameInstance = game;
        window.gameInstance = game;
        if (window.URL_PARAMS?.roomCode) {
          setTimeout(async () => {
            try {
              await game.joinMultiplayerRoom(window.URL_PARAMS.roomCode);
              startGame('Plain');
            } catch (error) {
              console.error('自动加入房间失败:', error);
            }
          }, 2000);
        }
        return game;
      } catch (error) {
        console.error("❌ Error creating game instance:", error);
        return null;
      }
    }

    function getCanvasCoordinates(e) {
      const rect = screen.getBoundingClientRect();
      const scaleX = screen.width / rect.width;
      const scaleY = screen.height / rect.height;
      return { x: (e.clientX - rect.left) * scaleX, y: (e.clientY - rect.top) * scaleY };
    }
    function resetMouseMove() { mouseTargetX = mouseTargetY = null; isMouseMoving = false; }
    function setMouseTarget(x, y) {
      if (gameState === 'in_game' && gameInstance?.player) {
        mouseTargetX = x + (gameInstance.cameraOffset?.x || 0);
        mouseTargetY = y + (gameInstance.cameraOffset?.y || 0);
        isMouseMoving = true;
      }
    }
    function updatePlayerMovementByMouse() {
      if (!isMouseMoving || !gameInstance?.player || mouseTargetX === null || mouseTargetY === null) return;
      const player = gameInstance.player;
      const playerX = player.physicsBody?.position?.x || 0;
      const playerY = player.physicsBody?.position?.y || 0;
      const dx = mouseTargetX - playerX, dy = mouseTargetY - playerY;
      const distance = Math.sqrt(dx*dx + dy*dy);
      if (distance < MOUSE_MOVE_SPEED) {
        if (player.physicsBody?.position) {
          player.physicsBody.position.x = mouseTargetX;
          player.physicsBody.position.y = mouseTargetY;
        } else { player.x = mouseTargetX; player.y = mouseTargetY; }
        resetMouseMove();
      } else {
        const angle = Math.atan2(dy, dx);
        const moveX = Math.cos(angle) * MOUSE_MOVE_SPEED;
        const moveY = Math.sin(angle) * MOUSE_MOVE_SPEED;
        if (player.physicsBody?.position) {
          player.physicsBody.position.x += moveX;
          player.physicsBody.position.y += moveY;
        } else { player.x += moveX; player.y += moveY; }
      }
      if (gameInstance.cameraOffset) {
        const currentX = player.physicsBody?.position?.x || player.x || 0;
        const currentY = player.physicsBody?.position?.y || player.y || 0;
        gameInstance.cameraOffset.x = currentX - window.WIDTH / 2;
        gameInstance.cameraOffset.y = currentY - window.HEIGHT / 2;
      }
    }

    function isPointInInventoryArea(x, y) { return x >= 0 && x <= 400; }
    function isPointInCloseButton(x, y) { return Math.hypot(x - 370, y - 30) <= 15; }
    function openInventory() {
      if (!gameInstance?.player?.inventory) { alert('Inventory system not available. Please start a game first.'); return; }
      if (gameInstance.player.inventory.craftingSystem) gameInstance.player.inventory.craftingSystem.craftingVisible = false;
      gameState = 'inventory';
    }
    function openCrafting() {
      if (!gameInstance?.player?.inventory?.craftingSystem) { alert('Crafting system not available. Please start a game first.'); return; }
      gameInstance.player.inventory.craftingSystem.craftingVisible = true;
      gameState = 'crafting';
    }
    function closeInventory() { gameState = 'in_game'; }

    function handleInventoryClick(x, y) {
      if (!gameInstance?.player?.inventory) return false;
      const inventory = gameInstance.player.inventory;
      const items = inventory.items;
      if (!items || items.length === 0) return false;
      const areaX = 20, areaY = 80, slotSize = 70, slotMargin = 10, cols = 3, maxVisibleRows = 6, titleHeight = 50;
      if (x < areaX || x > areaX + 340 || y < areaY || y > areaY + (window.innerHeight - 150)) return false;
      const RARITY_ORDER = ["Omega","Super","Ultra","Mythic","Legendary","Epic","Rare","Unusual","Common"];
      const sortedItems = [...items].sort((a,b) => (RARITY_ORDER.indexOf(a.rarity)||999) - (RARITY_ORDER.indexOf(b.rarity)||999));
      const startIndex = inventory.scrollOffset * cols;
      const visibleItems = sortedItems.slice(startIndex, startIndex + maxVisibleRows * cols);
      const relX = x - areaX - slotMargin, relY = y - areaY - titleHeight;
      const col = Math.floor(relX / (slotSize + slotMargin)), row = Math.floor(relY / (slotSize + slotMargin));
      const clickedIndex = row * cols + col;
      if (col < 0 || col >= cols || row < 0 || row >= maxVisibleRows || clickedIndex >= visibleItems.length) return false;
      const item = visibleItems[clickedIndex];
      if (!item) return false;
      const originalIndex = items.findIndex(origItem => origItem === item || (origItem.type === item.type && origItem.rarity === item.rarity && origItem.level === item.level && origItem.count >= item.count));
      if (originalIndex === -1) return false;
      return addItemToQuickSlot(item, originalIndex);
    }

    function addItemToQuickSlot(item, itemIndex) {
      if (!gameInstance?.player?.quickSlot || !gameInstance?.player?.inventory) return false;
      const quickSlot = gameInstance.player.quickSlot;
      const inventory = gameInstance.player.inventory;
      const items = inventory.items;
      if (!Array.isArray(items) || itemIndex < 0 || itemIndex >= items.length) return false;
      const targetItem = items[itemIndex];
      if (!targetItem) return false;
      for (let i = 0; i < quickSlot.slots.length; i++) {
        if (!quickSlot.slots[i]) {
          if (targetItem.count > 1) {
            targetItem.count--;
            const newItem = new Item(item.type, item.level || 1, item.rarity);
            newItem.count = 1;
            Object.assign(newItem, { durability: item.durability, maxDurability: item.maxDurability, isBroken: item.isBroken, reloadTime: item.reloadTime, baseReloadTime: item.baseReloadTime, armor: item.armor });
            quickSlot.slots[i] = newItem;
          } else {
            const movedItem = items.splice(itemIndex, 1)[0];
            movedItem.count = 1;
            quickSlot.slots[i] = movedItem;
          }
          quickSlot.updatePetalFromSlot?.(i);
          return true;
        }
      }
      if (quickSlot.secondarySlots) {
        for (let i = 0; i < quickSlot.secondarySlots.length; i++) {
          if (!quickSlot.secondarySlots[i]) {
            if (targetItem.count > 1) {
              targetItem.count--;
              const newItem = new Item(item.type, item.level || 1, item.rarity);
              newItem.count = 1;
              Object.assign(newItem, { durability: item.durability, maxDurability: item.maxDurability, isBroken: item.isBroken, reloadTime: item.reloadTime, baseReloadTime: item.baseReloadTime, armor: item.armor });
              quickSlot.secondarySlots[i] = newItem;
            } else {
              const movedItem = items.splice(itemIndex, 1)[0];
              movedItem.count = 1;
              quickSlot.secondarySlots[i] = movedItem;
            }
            return true;
          }
        }
      }
      return false;
    }

    // ===== 鼠标/键盘事件 =====
    function handleMouseDown(e) {
      e.preventDefault();
      const { x, y } = getCanvasCoordinates(e);
      if (gameState === 'in_game' && e.button === 2) setMouseTarget(x, y);
      const event = { type: 'mousedown', button: e.button, x, y };
      if (gameState === 'main_menu' && gameInstance) {
        if (gameInstance.shopSystem?.visible) {
          gameInstance.shopSystem.handleClick([x, y]);
          return;
        }
        const result = gameInstance.mainMenu.handleClick(event);
        if (result) {
          switch(result) {
            case "shop": if (gameInstance.shopSystem) gameInstance.shopSystem.visible = true; break;
            case "crafting": if (gameInstance.player?.inventory?.craftingSystem) { gameInstance.player.inventory.craftingSystem.craftingVisible = true; gameState = 'crafting'; } break;
            case "inventory": openInventory(); break;
            case "multiplayer": showMultiplayerPanel(); break;
            case "account": showAccountPanel(); break;
            case "bonus": if (gameInstance.bonusSystem?.claimBonus) gameInstance.bonusSystem.claimBonus(); break;
            default:
              if (result && result.startsWith('start_') && result.endsWith('_map')) {
                let biome = result.replace('start_', '').replace('_map', '');
                biome = biome.charAt(0).toUpperCase() + biome.slice(1);
                startGame(biome);
              } else if (result === 'start_maze') startMazeMode();
          }
        }
      } else if (gameState === 'in_game' && gameInstance) {
        if (gameInstance.player?.quickSlot?.handleClick([x, y])) return;
        if (gameInstance?.handleEvents) gameInstance.handleEvents(event);
      } else if (gameState === 'crafting' && gameInstance?.player?.inventory?.craftingSystem) {
        gameInstance.player.inventory.craftingSystem.handleMouseDown?.([x, y]);
      } else if (gameState === 'inventory' && gameInstance?.player?.inventory) {
        if (isPointInCloseButton(x, y)) closeInventory();
        else if (isPointInInventoryArea(x, y)) gameInstance.player.inventory.handleMouseDown?.([x, y]);
      }
    }
    function handleMouseUp(e) {
      e.preventDefault();
      const { x, y } = getCanvasCoordinates(e);
      const event = { type: 'mouseup', button: e.button, x, y };
      if (gameState === 'in_game' && gameInstance?.handleEvents) {
        gameInstance.handleEvents(event);
        gameInstance.handleEvents({ type: 'click', x, y });
      } else if (gameState === 'crafting' && gameInstance?.player?.inventory?.craftingSystem) {
        const crafting = gameInstance.player.inventory.craftingSystem;
        crafting.handleMouseUp?.([x, y]);
        crafting.handleClick?.([x, y]);
      } else if (gameState === 'inventory' && gameInstance?.player?.inventory) {
        if (isPointInCloseButton(x, y)) closeInventory();
        else if (isPointInInventoryArea(x, y)) {
          gameInstance.player.inventory.handleMouseUp?.([x, y]);
          handleInventoryClick(x, y);
        }
      }
    }
    function handleMouseMove(e) {
      e.preventDefault();
      const { x, y } = getCanvasCoordinates(e);
      window.mouseX = x; window.mouseY = y;
      if (gameState === 'main_menu' && gameInstance?.mainMenu?.handleMouseMove) {
        gameInstance.mainMenu.handleMouseMove({ type: 'mousemove', x, y });
        if (gameInstance.shopSystem) { gameInstance.shopSystem.mouseX = x; gameInstance.shopSystem.mouseY = y; }
      } else if (gameState === 'in_game' && gameInstance?.handleEvents) {
        gameInstance.handleEvents({ type: 'mousemove', x, y });
        gameInstance.player?.updateMousePosition?.(x, y);
        if (gameInstance.player) {
          if (gameInstance.player.inventory) { gameInstance.player.inventory.mouseX = x; gameInstance.player.inventory.mouseY = y; }
          if (gameInstance.player.quickSlot) { gameInstance.player.quickSlot.mouseX = x; gameInstance.player.quickSlot.mouseY = y; }
          if (gameInstance.player.inventory?.craftingSystem) { gameInstance.player.inventory.craftingSystem.mouseX = x; gameInstance.player.inventory.craftingSystem.mouseY = y; }
        }
        if (gameInstance.shopSystem) { gameInstance.shopSystem.mouseX = x; gameInstance.shopSystem.mouseY = y; }
      } else if (gameState === 'crafting' && gameInstance?.player?.inventory?.craftingSystem) {
        const crafting = gameInstance.player.inventory.craftingSystem;
        crafting.handleMouseMove?.([x, y]);
        crafting.mouseX = x; crafting.mouseY = y;
      } else if (gameState === 'inventory' && gameInstance?.player?.inventory) {
        gameInstance.player.inventory.mouseX = x; gameInstance.player.inventory.mouseY = y;
        if (isPointInInventoryArea(x, y)) gameInstance.player.inventory.handleMouseMove?.([x, y]);
      }
    }
    function handleWheel(e) {
      e.preventDefault();
      e.stopPropagation();
      const { x, y } = getCanvasCoordinates(e);
      const wheelEvent = { type: 'wheel', deltaY: e.deltaY, x, y };
      if (gameState === 'main_menu' && gameInstance?.shopSystem?.visible) {
        gameInstance.shopSystem.handleClick?.(wheelEvent);
      } else if (gameState === 'in_game' && gameInstance?.handleEvents) {
        gameInstance.handleEvents(wheelEvent);
      } else if (gameState === 'crafting' && gameInstance?.player?.inventory?.craftingSystem) {
        gameInstance.player.inventory.craftingSystem.handleScrollWheel?.(e);
      } else if (gameState === 'inventory' && gameInstance?.player?.inventory) {
        if (isPointInInventoryArea(x, y)) gameInstance.player.inventory.handleScrollWheel?.(e);
      }
    }

    function initializePlayerControls() {
      if (controlsInitialized) {
        screen.removeEventListener('mousedown', handleMouseDown);
        screen.removeEventListener('mouseup', handleMouseUp);
        screen.removeEventListener('mousemove', handleMouseMove);
        screen.removeEventListener('wheel', handleWheel);
      }
      screen.addEventListener('mousedown', handleMouseDown);
      screen.addEventListener('mouseup', handleMouseUp);
      screen.addEventListener('mousemove', handleMouseMove);
      screen.addEventListener('wheel', handleWheel, { passive: false });
      screen.addEventListener('contextmenu', e => e.preventDefault());
      controlsInitialized = true;
    }

    function handleKeyDown(e) {
      if (!e || !e.key) return;
      if (gameInstance?.shopSystem?.redeemSystem?.inputVisible && gameInstance.shopSystem.redeemSystem.inputActive) {
        if (gameInstance.shopSystem.redeemSystem.handleKeyDown(e)) { e.preventDefault(); e.stopPropagation(); return; }
      }
      if (gameInstance?.multiplayerMode && gameInstance?.network?.chatSystem?.inputActive) {
        if (gameInstance.network.chatSystem.handleKeyDown(e)) { e.preventDefault(); e.stopPropagation(); return; }
      }
      const key = e.key;
      if (key === 't' || key === 'T') {
        if (gameInstance?.multiplayerMode && gameInstance?.network?.chatSystem) {
          gameInstance.toggleChat();
          if (gameInstance.chatVisible) gameInstance.network.chatSystem.inputActive = true;
        }
        e.preventDefault();
        return;
      }
      if (key >= '1' && key <= '8') {
        const idx = parseInt(key) - 1;
        if (gameState === 'in_game' && gameInstance?.player?.quickSlot) {
          gameInstance.player.quickSlot.selectedIndex = idx;
          gameInstance.player.quickSlot.useItem(idx);
        }
        e.preventDefault();
        return;
      }
      if (key === '9') { if (gameState === 'in_game' && gameInstance?.player?.quickSlot) { gameInstance.player.quickSlot.selectedIndex = 8; gameInstance.player.quickSlot.useItem(8); } e.preventDefault(); return; }
      if (key === '0') { if (gameState === 'in_game' && gameInstance?.player?.quickSlot) { gameInstance.player.quickSlot.selectedIndex = 9; gameInstance.player.quickSlot.useItem(9); } e.preventDefault(); return; }
      if (key === ' ' || key === 'Space') {
        if (gameState === 'in_game' && gameInstance?.player) gameInstance.player.toggleSpreadMode();
        e.preventDefault();
        return;
      }
      if (key === 'c' || key === 'C') {
        if (gameState === 'in_game') openCrafting();
        else if (gameState === 'crafting') { gameState = 'in_game'; if (gameInstance.player?.inventory?.craftingSystem) gameInstance.player.inventory.craftingSystem.craftingVisible = false; }
        e.preventDefault();
        return;
      }
      if (key === 'i' || key === 'I') {
        if (gameState === 'in_game') openInventory();
        else if (gameState === 'inventory') gameState = 'in_game';
        e.preventDefault();
        return;
      }
      if (key === 'b' || key === 'B') {
        if (gameState === 'in_game' && gameInstance?.bonusSystem) gameInstance.bonusSystem.claimBonus();
        e.preventDefault();
        return;
      }
      if (key === 's' || key === 'S') {
        const game = window.gameInstance;
        if (game && game.gameState === 'in_game' && !game.paused && game.player) {
          e.preventDefault(); e.stopPropagation();
          for (const petal of game.player.petals) if (petal.toggleStillMode) petal.toggleStillMode();
        }
        return;
      }
      if (key === 'r' || key === 'R') {
        if (gameState === 'in_game' && gameInstance?.player?.quickSlot) gameInstance.player.quickSlot.swapAllSlots();
        e.preventDefault();
        return;
      }
      if (key === 'd' || key === 'D') {
        if (gameState === 'in_game' && gameInstance) gameInstance.debugMode = !gameInstance.debugMode;
        e.preventDefault();
        return;
      }
      if (key === 'p' || key === 'P') {
        if (gameState === 'in_game' && gameInstance) gameInstance.paused = !gameInstance.paused;
        e.preventDefault();
        return;
      }
      if (key === 'Escape') {
        e.preventDefault(); e.stopPropagation();
        if (gameState !== 'main_menu') returnToMainMenu();
        else if (gameInstance?.shopSystem?.visible) gameInstance.shopSystem.visible = false;
        return;
      }
      if (['w','W','a','A','s','S','d','D','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(key)) {
        resetMouseMove();
        e.preventDefault();
        return;
      }
      if (key === 'Enter') {
        if (document.getElementById('room-code-input') && document.activeElement === document.getElementById('room-code-input')) joinRoom();
        else if (document.getElementById('login-username') && document.activeElement === document.getElementById('login-username')) handleLogin();
        else if (document.getElementById('register-username') && document.activeElement === document.getElementById('register-username')) handleRegister();
        e.preventDefault();
        return;
      }
    }
    function handleKeyUp(e) {}

    let isProcessingEscape = false;
    function returnToMainMenu() {
      if (isProcessingEscape) return;
      isProcessingEscape = true;
      if (gameState === 'crafting' && gameInstance?.player?.inventory?.craftingSystem) gameInstance.player.inventory.craftingSystem.craftingVisible = false;
      if (gameState === 'in_game' && gameInstance && gameInstance.player && gameInstance.player.quickSlot) {
        for (let i = 0; i < gameInstance.player.quickSlot.slots.length; i++) {
          const item = gameInstance.player.quickSlot.slots[i];
          const petal = gameInstance.player.petals[i];
          if (item && item.type !== "Mimic") {
            let originalData = petal?.originalMimicData || item._originalMimicData || gameInstance.player._mimicBackups?.[i] || gameInstance._mimicBackups?.[i];
            if (originalData && originalData.type === "Mimic") {
              item.type = originalData.type; item.rarity = originalData.rarity; item.level = originalData.level;
              item.durability = originalData.durability; item.maxDurability = originalData.maxDurability;
              item.reloadTime = originalData.reloadTime; item.baseReloadTime = originalData.baseReloadTime; item.armor = originalData.armor;
              if (petal && petal.updateFromQuickSlot) petal.updateFromQuickSlot(i);
              if (petal) petal.originalMimicData = null;
              item._originalMimicData = null;
              if (gameInstance.player._mimicBackups) delete gameInstance.player._mimicBackups[i];
              if (gameInstance._mimicBackups) delete gameInstance._mimicBackups[i];
            }
          }
        }
      }
      if (gameInstance?.autoSave) gameInstance.autoSave();
      gameState = 'main_menu';
      editorMode = false;
      if (gameInstance) gameInstance.gameState = 'main_menu';
      resetMouseMove();
      setTimeout(() => { isProcessingEscape = false; }, 100);
    }

    async function startGame(biome) {
      if (!gameInstance) gameInstance = createGameInstance();
      if (!gameInstance) { alert('Failed to create game instance!'); return; }
      try {
        if (typeof WORLD_WIDTH === 'undefined') window.WORLD_WIDTH = 5000;
        if (typeof WORLD_HEIGHT === 'undefined') window.WORLD_HEIGHT = 5000;
        await gameInstance.startGame(biome);
        gameState = 'in_game';
        editorMode = false;
        if (!controlsInitialized) initializePlayerControls();
        resetMouseMove();
      } catch (error) { console.error('Error starting game:', error); alert('Failed to start game: ' + error.message); }
    }
    async function startMazeMode() {
      if (!gameInstance) gameInstance = createGameInstance();
      if (!gameInstance) { alert('Failed to create game instance!'); return; }
      try {
        if (typeof MAZE_WIDTH === 'undefined') window.MAZE_WIDTH = 10000;
        if (typeof MAZE_HEIGHT === 'undefined') window.MAZE_HEIGHT = 10000;
        gameInstance.startMazeMode();
        gameState = 'in_game';
        editorMode = true;
        if (!controlsInitialized) initializePlayerControls();
        resetMouseMove();
      } catch (error) { console.error('Error starting maze mode:', error); alert('Failed to start maze mode: ' + error.message); }
    }

    function gameLoop() {
      animationFrameId = requestAnimationFrame(gameLoop);
      if (!gameInstance) return;
      const dt = 16.67 / 1000;
      if (gameState === 'in_game') updatePlayerMovementByMouse();
      if (gameState === 'in_game' && gameInstance.update) gameInstance.update(dt);
      else if (gameState === 'crafting' && gameInstance.player?.inventory?.craftingSystem?.update) gameInstance.player.inventory.craftingSystem.update(dt);
      else if (gameState === 'inventory' && gameInstance.player?.inventory?.update) gameInstance.player.inventory.update(dt);

      if (gameState === 'main_menu') {
        ctx.clearRect(0, 0, screen.width, screen.height);
        ctx.fillStyle = '#1a1a2e'; ctx.fillRect(0, 0, screen.width, screen.height);
        if (gameInstance?.mainMenu) {
          gameInstance.mainMenu.draw(ctx);
          if (gameInstance.shopSystem?.visible) { gameInstance.shopSystem.update(); gameInstance.shopSystem.draw(ctx); }
          ctx.save();
          const btnWidth = 200, btnHeight = 50, btnX = screen.width/2 - btnWidth/2, btnY = screen.height/2 + 440;
          ctx.fillStyle = '#8B4513'; ctx.fillRect(btnX, btnY, btnWidth, btnHeight);
          ctx.strokeStyle = '#CD853F'; ctx.lineWidth = 2; ctx.strokeRect(btnX, btnY, btnWidth, btnHeight);
          drawButtonTextWithBorder(ctx, 'MAZE MODE', btnX, btnY, btnWidth, btnHeight, { font: 'bold 20px "Arial", sans-serif', fillColor: '#FFD700' });
          ctx.restore();
        } else drawFallbackMenu(ctx);
      } else if (gameState === 'in_game') {
        ctx.clearRect(0, 0, screen.width, screen.height);
        gameInstance.draw(ctx);
        let hints = '右键点击地面移动 | C: 合成 | I: 背包 | ESC: 菜单 | S: 静止 | T: 聊天';
        if (gameInstance.useMaze) hints = '🗺️ 迷宫模式 | E: 编辑器 | S: 保存地图 | L: 加载地图 | M: 控制面板 | ' + hints;
        drawTextWithBorder(ctx, hints, 10, 20, { font: '12px "Arial", sans-serif', textAlign: 'left', textBaseline: 'top', borderWidth: 2 });
        if (gameInstance.editorMode) drawTextWithBorder(ctx, '🔨 编辑器模式 - 点击清除墙壁 | Shift+点击放置墙壁', screen.width/2, 50, { font: '16px "Arial", sans-serif', textAlign: 'center', textBaseline: 'top', borderWidth: 2, fillColor: '#FFA500' });
        if (isMouseMoving && mouseTargetX !== null && mouseTargetY !== null && gameInstance.cameraOffset) {
          const sx = mouseTargetX - gameInstance.cameraOffset.x, sy = mouseTargetY - gameInstance.cameraOffset.y;
          if (sx >= 0 && sx <= screen.width && sy >= 0 && sy <= screen.height) {
            ctx.save();
            ctx.strokeStyle = 'rgba(255,255,0,0.8)'; ctx.fillStyle = 'rgba(255,255,0,0.3)'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(sx, sy, 15, 0, Math.PI*2); ctx.stroke();
            ctx.beginPath(); ctx.arc(sx, sy, 8, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.moveTo(sx-20,sy); ctx.lineTo(sx+20,sy); ctx.moveTo(sx,sy-20); ctx.lineTo(sx,sy+20);
            ctx.strokeStyle = 'rgba(255,255,0,0.5)'; ctx.stroke();
            ctx.restore();
          }
        }
      } else if (gameState === 'crafting' && gameInstance.player?.inventory?.craftingSystem) {
        ctx.clearRect(0, 0, screen.width, screen.height);
        ctx.fillStyle = '#16213e'; ctx.fillRect(0, 0, screen.width, screen.height);
        ctx.globalAlpha = 0.3; gameInstance.draw(ctx); ctx.globalAlpha = 1.0;
        const crafting = gameInstance.player.inventory.craftingSystem;
        crafting.craftingVisible = true;
        crafting.draw(ctx);
        drawTextWithBorder(ctx, 'ESC: 返回游戏', 10, 20, { font: '12px "Arial", sans-serif', textAlign: 'left', textBaseline: 'top', borderWidth: 2 });
      } else if (gameState === 'inventory' && gameInstance.player?.inventory) {
        ctx.clearRect(0, 0, screen.width, screen.height);
        ctx.fillStyle = '#16213e'; ctx.fillRect(0, 0, screen.width, screen.height);
        gameInstance.draw(ctx);
        ctx.save();
        ctx.beginPath(); ctx.rect(0, 0, 400, screen.height); ctx.clip();
        ctx.fillStyle = 'rgba(30,30,50,0.9)'; ctx.fillRect(0, 0, 400, screen.height);
        ctx.strokeStyle = 'rgba(200,200,200,0.8)'; ctx.lineWidth = 2; ctx.strokeRect(2, 2, 396, screen.height-4);
        drawTextWithBorder(ctx, 'INVENTORY', 200, 50, { font: 'bold 28px "Arial", sans-serif', textAlign: 'center', textBaseline: 'middle', borderWidth: 3 });
        ctx.fillStyle = '#ff6b6b'; ctx.beginPath(); ctx.arc(370, 30, 15, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = 'white'; ctx.lineWidth = 2; ctx.stroke();
        drawTextWithBorder(ctx, 'X', 370, 30, { font: 'bold 18px "Arial", sans-serif', textAlign: 'center', textBaseline: 'middle', borderWidth: 2, fillColor: 'white' });
        if (gameInstance.player.inventory.draw) gameInstance.player.inventory.draw(ctx);
        ctx.restore();
        if (gameInstance.player?.quickSlot?.draw) gameInstance.player.quickSlot.draw(ctx);
        drawTextWithBorder(ctx, '点击物品添加到快捷栏 | ESC: 返回游戏', 10, screen.height-10, { font: '12px "Arial", sans-serif', textAlign: 'left', textBaseline: 'bottom', borderWidth: 2 });
      }
    }

    function drawFallbackMenu(ctx) {
      ctx.fillStyle = '#1a1a2e'; ctx.fillRect(0, 0, screen.width, screen.height);
      drawTextWithBorder(ctx, '🌸 flwrr 🌸', screen.width/2, screen.height/2-100, { font: '48px "Arial", sans-serif', textAlign: 'center', textBaseline: 'middle', borderWidth: 4 });
      drawTextWithBorder(ctx, 'Click to Start', screen.width/2, screen.height/2, { font: '24px "Arial", sans-serif', textAlign: 'center', textBaseline: 'middle', borderWidth: 3, fillColor: '#888' });
      const buttons = [
        { text: 'Plain', y: screen.height/2+80 }, { text: 'Bio', y: screen.height/2+140 },
        { text: 'Desert', y: screen.height/2+200 }, { text: 'Random', y: screen.height/2+260 },
        { text: 'Crafting', y: screen.height/2+320 }, { text: 'Inventory', y: screen.height/2+380 },
        { text: 'MAZE MODE', y: screen.height/2+440, color: '#8B4513' }
      ];
      buttons.forEach(btn => {
        ctx.fillStyle = btn.color || '#4a4a6a';
        const btnWidth = 200, btnHeight = 50, btnX = screen.width/2 - btnWidth/2;
        ctx.fillRect(btnX, btn.y, btnWidth, btnHeight);
        ctx.strokeStyle = btn.color ? '#CD853F' : '#6a6a8a';
        ctx.strokeRect(btnX, btn.y, btnWidth, btnHeight);
        drawButtonTextWithBorder(ctx, btn.text, btnX, btn.y, btnWidth, btnHeight, { font: 'bold 20px "Arial", sans-serif', fillColor: btn.text === 'MAZE MODE' ? '#FFD700' : 'white', borderWidth: 2 });
      });
    }

    window.addEventListener('resize', () => {
      window.WIDTH = window.innerWidth; window.HEIGHT = window.innerHeight;
      screen.width = window.WIDTH; screen.height = window.HEIGHT;
      if (gameInstance) gameInstance.screen = ctx;
    });

    window.addEventListener('load', () => {
      initDOMElements();
      gameInstance = createGameInstance();
      gameLoop();
      initializePlayerControls();
    });

    document.addEventListener('keydown', handleKeyDown);
    document.addEventListener('keyup', handleKeyUp);
    </script>
</body>
</html>
