<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Flwrr - 多人竞技游戏</title>
<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: 'Arial', sans-serif;
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  color: white;
  touch-action: none;
}
#gameCanvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 1000;
  cursor: default;
  touch-action: none;
}

/* ========== 手机版自适应样式 ========== */
@media (max-width: 768px) {
  .touch-btn {
    width: 50px;
    height: 50px;
    font-size: 14px;
  }
  #joystick-area {
    width: 110px;
    height: 110px;
  }
  #joystick-base {
    width: 110px;
    height: 110px;
  }
  #joystick-knob {
    width: 42px;
    height: 42px;
    top: 34px;
    left: 34px;
  }
  #toggle-joystick, #toggle-panel {
    width: 38px;
    height: 38px;
    font-size: 18px;
  }
  #touch-hint {
    font-size: 9px;
    white-space: nowrap;
  }
  #btn-area {
    gap: 8px;
  }
}

/* ========== 触屏控制样式 ========== */
#touch-controls {
  display: block;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 220px;
  z-index: 3000;
  pointer-events: none;
  user-select: none;
}
#touch-controls.hidden { display: none; }

/* 虚拟摇杆 */
#joystick-area {
  position: absolute;
  bottom: 20px; left: 20px;
  width: 140px; height: 140px;
  pointer-events: all;
}
#joystick-area.hidden { display: none; }
#joystick-base {
  position: absolute;
  width: 140px; height: 140px;
  border-radius: 50%;
  background: rgba(255,255,255,0.12);
  border: 2px solid rgba(255,255,255,0.3);
}
#joystick-knob {
  position: absolute;
  width: 54px; height: 54px;
  border-radius: 50%;
  background: rgba(255,255,255,0.45);
  border: 2px solid rgba(255,255,255,0.7);
  top: 43px; left: 43px;
  transition: none;
  pointer-events: none;
}

/* 右侧按钮区域 */
#btn-area {
  position: absolute;
  bottom: 20px; right: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  align-items: flex-end;
  pointer-events: all;
}
.touch-btn {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: bold;
  color: white;
  border: 2px solid rgba(255,255,255,0.5);
  cursor: pointer;
  pointer-events: all;
  user-select: none;
  transition: transform 0.08s, opacity 0.08s;
}
.touch-btn:active { transform: scale(0.88); opacity: 0.7; }
#btn-space { background: rgba(100,200,100,0.55); }
#btn-r     { background: rgba(180,80,180,0.55); }
#btn-esc   { background: rgba(200,60,60,0.55); }

/* 切换按钮 */
#toggle-joystick {
  position: absolute;
  bottom: 20px;
  left: 180px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(0,0,0,0.5);
  border: 2px solid rgba(255,255,255,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  cursor: pointer;
  pointer-events: all;
  z-index: 3001;
}
#toggle-joystick:active { transform: scale(0.9); }
#toggle-joystick.hidden-mode { background: rgba(0,150,0,0.5); border-color: #0f0; }

#toggle-panel {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(0,0,0,0.6);
  border: 2px solid rgba(255,255,255,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  cursor: pointer;
  pointer-events: all;
  z-index: 3100;
}

/* 提示信息 */
#touch-hint {
  position: fixed;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.6);
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 11px;
  color: #aaa;
  pointer-events: none;
  z-index: 3001;
  white-space: nowrap;
}

/* 多人游戏面板 */
#multiplayer-panel {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.75);
  backdrop-filter: blur(3px);
  z-index: 5000;
  display: none;
  align-items: center;
  justify-content: center;
}
#multiplayer-panel > div {
  background: rgba(20, 30, 40, 0.95);
  border-radius: 20px;
  padding: 30px;
  min-width: 280px;
  max-width: 90%;
  text-align: center;
  border: 1px solid rgba(255,215,0,0.5);
}
#multiplayer-panel h2 { color: #ffd700; margin-bottom: 15px; }
#multiplayer-panel input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  background: #1e2a3a;
  border: 1px solid #ffd700;
  color: white;
  border-radius: 10px;
  font-size: 16px;
}
#multiplayer-panel button {
  background: #2c3e50;
  border: none;
  padding: 10px 20px;
  margin: 8px;
  border-radius: 30px;
  color: white;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}
#multiplayer-panel button.cancel { background: #c0392b; }

#room-info {
  position: fixed;
  top: 10px;
  right: 10px;
  color: #00ff00;
  font-size: 14px;
  z-index: 1001;
  background: rgba(0,0,0,0.7);
  padding: 8px 15px;
  border-radius: 20px;
  border: 1px solid #00ff00;
  pointer-events: none;
}

#current-user {
  position: fixed;
  top: 10px;
  left: 10px;
  color: #f1c40f;
  font-size: 14px;
  z-index: 1001;
  background: rgba(0,0,0,0.7);
  padding: 8px 15px;
  border-radius: 20px;
  border: 1px solid #f1c40f;
  pointer-events: none;
  display: none;
}

/* 横屏提示 */
#orientation-tip {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.95);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  z-index: 10000;
  text-align: center;
  font-size: 20px;
  backdrop-filter: blur(5px);
}
#orientation-tip.hidden { display: none; }

canvas {
  width: 100%;
  height: auto;
  max-width: 100%;
  display: block;
}
</style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div id="room-info" style="display: none;"></div>
    <div id="current-user" style="display: none;"></div>

    <!-- 横屏提示 -->
    <div id="orientation-tip" class="hidden">
        <div>📱 请将设备旋转至横屏模式</div>
        <div style="margin-top: 20px; font-size: 16px; opacity:0.7;">游戏最佳体验为横屏</div>
        <div style="margin-top: 30px; font-size: 14px; opacity:0.5;">点击屏幕继续</div>
    </div>

    <!-- 触屏控制 -->
    <div id="touch-controls">
      <div id="toggle-joystick">🎮</div>
      <div id="joystick-area">
        <div id="joystick-base"></div>
        <div id="joystick-knob"></div>
      </div>
      <div id="btn-area">
        <div class="touch-btn" id="btn-space">SP</div>
        <div class="touch-btn" id="btn-r">SW</div>
        <div class="touch-btn" id="btn-esc">MN</div>
      </div>
    </div>
    <div id="toggle-panel">🎮</div>
    <div id="touch-hint">💡 左键摇杆移动 | 右键点击地面移动 | SP=展开 | SW=交换 | MN=菜单</div>

    <!-- 多人游戏面板 -->
    <div id="multiplayer-panel">
        <div>
            <h2>👥 多人游戏</h2>
            <div id="mp-menu">
                <button onclick="showCreateRoom()">🎮 创建房间</button>
                <button onclick="showJoinRoom()">🔑 加入房间</button>
                <button class="cancel" onclick="hideMultiplayerPanel()">❌ 返回</button>
            </div>
            <div id="mp-create" style="display: none;">
                <h3>创建房间</h3>
                <div id="room-code-display" class="room-code">------</div>
                <div id="room-link-display" class="link-box"></div>
                <button onclick="copyRoomLink()">📋 复制链接</button>
                <button class="cancel" onclick="backToMenu()">↩️ 返回</button>
            </div>
            <div id="mp-join" style="display: none;">
                <h3>加入房间</h3>
                <input type="text" id="room-code-input" placeholder="输入6位房间号" maxlength="6">
                <button onclick="joinRoom()">✅ 加入</button>
                <button class="cancel" onclick="backToMenu()">↩️ 返回</button>
                <p id="join-error" style="color: #ff6b6b; margin-top: 10px;"></p>
            </div>
        </div>
    </div>

    <script type="module">
    import {
      QuickSlot, Item, Inventory, StarCraftUI, RARITY_LIST, RARITY_COLORS,
      ARMOR_ELIGIBLE_ITEMS, ITEM_ARMOR_VALUES, WorldMapGame, ImageLoader,
      ProbabilityCalculator, CraftAnimation
    } from './game.js';

    // ========== 物品导入导出 ==========

    window.handleExportItems = () => {
        const game = window.gameInstance;
        if (!game || !game.player) { alert("请先进入游戏！"); return; }
        const player = game.player;

        const nameMapping = {
            "FireStick":"Fire Stick","PooStick":"Poo Stick","SnowStick":"Snow Stick",
            "HelWorm egg":"Hel Worm Egg","HelSpider egg":"Hel Spider Egg","HelBee egg":"Hel Bee Egg",
            "HelHornet egg":"Hel Hornet Egg","HelBeetle egg":"Hel Beetle Egg","HelHive egg":"Hel Hive Egg",
            "HelJellyfish egg":"Hel Jellyfish Egg","HelQueenBee egg":"Hel Queen Bee Egg",
            "HelDigger egg":"Hel Digger Egg","HelBeekeeper egg":"Hel Beekeeper Egg",
            "Hel Lighting":"Hel Lightning","Hel Honey":"Hel Honey",
            "Dragon egg":"Dragon Egg","DragonNest egg":"Dragon Nest Egg",
            "ToxicDragon egg":"Toxic Dragon Egg","IceDragon egg":"Ice Dragon Egg",
            "QueenAnt egg":"Queen Ant Egg","SoldierAnt egg":"Soldier Ant Egg",
            "WorkerAnt egg":"Worker Ant Egg","QueenBee egg":"Queen Bee Egg",
            "FireAntOvermind egg":"Fire Ant Overmind Egg","FireAntHole egg":"Fire Ant Hole Egg",
            "WorkerFireAnt egg":"Worker Fire Ant Egg","SoldierFireAnt egg":"Soldier Fire Ant Egg",
            "BabyFireAnt egg":"Baby Fire Ant Egg","Crab egg":"Crab Egg","CrabHole egg":"Crab Hole Egg",
            "Jellyfish egg":"Jellyfish Egg","Starfish egg":"Starfish Egg","Bubble egg":"Bubble Egg",
            "Shell egg":"Shell Egg","Squid egg":"Squid Egg","Shipwreck egg":"Shipwreck Egg",
            "Barnacle egg":"Barnacle Egg","Leech Egg":"Leech Egg","Spider egg":"Spider Egg",
            "SpiderCave egg":"Spider Cave Egg","ArcticSpider egg":"Arctic Spider Egg",
            "ArcticSpiderCave egg":"Arctic Spider Cave Egg","Bee egg":"Bee Egg","Hive egg":"Hive Egg",
            "Beekeeper egg":"Beekeeper Egg","Wasp egg":"Wasp Egg",
            "WorkerTermite egg":"Worker Termite Egg","SoldierTermite egg":"Soldier Termite Egg",
            "TermiteHole egg":"Termite Hole Egg","TermiteOvermind egg":"Termite Overmind Egg",
            "Beetle egg":"Beetle Egg","Scorpion egg":"Scorpion Egg","Ladybug egg":"Ladybug Egg",
            "Centipede egg":"Centipede Egg","Firefly egg":"Firefly Egg","Mantis egg":"Mantis Egg",
            "StickBug egg":"Stickbug Egg","SlagMight egg":"Stalagmite Egg","IceCube egg":"Ice Cube Egg",
            "Igloo egg":"Igloo Egg","Tick egg":"Tick Egg","Snowman egg":"Snowman Egg",
            "FrostDigger egg":"Frost Digger Egg","StemCell egg":"Stem Cell Egg",
            "RedBloodCell egg":"Red Blood Cell Egg","WhiteBloodCell egg":"White Blood Cell Egg",
            "Bacteria_egg":"Bacteria Egg","Cancer egg":"Cancer Egg","Virus egg":"Virus Egg",
            "Bacteriophage egg":"Bacteriophage Egg","Parasite Egg":"Parasite Egg",
            "ManHole egg":"Manhole Egg","Fly_egg":"Fly Egg","Rat_egg":"Rat Egg",
            "Roach_egg":"Roach Egg","Trashcan egg":"Trashcan Egg","Digger egg":"Digger Egg",
            "MudDigger_egg":"Mud Digger Egg","TrashDigger egg":"Trash Digger Egg",
            "Biologist egg":"Biologist Egg","PirateDigger egg":"Pirate Digger Egg",
            "GraveDigger egg":"Grave Digger Egg","AlienDigger egg":"Alien Digger Egg",
            "Atom egg":"Atom Egg","Electron egg":"Electron Egg","Proton egg":"Proton Egg",
            "ElectronCloud egg":"Electron Cloud Egg","Photon egg":"Photon Egg",
            "BlackHole egg":"Black Hole Egg","WhiteHole egg":"White Hole Egg",
            "NeutronStar egg":"Neutron Star Egg","Star egg":"Star Egg","Asteroid egg":"Asteroid Egg",
            "Alien egg":"Alien Egg","UFO egg":"UFO Egg","Ghost egg":"Ghost Egg",
            "GraveStone egg":"Grave Stone Egg","Egg":"Egg","Ant Egg":"Ant Egg",
            "Moon Egg":"Moon Egg","Square Egg":"Square Egg","DNA":"DNA",
            "Bubonic Plague":"Bubonic Plague","Bubble Bomb":"Bubble Bomb","FireBomb":"Fire Bomb",
            "Golden Leaf":"Golden Leaf","Blood Stinger":"Blood Stinger","Gamma Ray":"Gamma Ray",
            "Ice Rose":"Ice Rose","Ice Cube":"Ice Cube","Trident":"Trident",
            "Controller":"Controller","Chromosome":"Chromosome","Singularity":"Singularity",
            "DarkMatter":"Dark Matter","ElectronCloud":"Electron Cloud","Stardust":"Stardust"
        };

        function convertName(oldName) {
            if (nameMapping[oldName]) return nameMapping[oldName];
            let cleaned = oldName.replace(/\s+/g, ' ').trim();
            if (!cleaned.includes(' ')) {
                cleaned = cleaned.replace(/([a-z])([A-Z])/g, '$1 $2');
                cleaned = cleaned.replace(/([A-Z])([A-Z][a-z])/g, '$1 $2');
                cleaned = cleaned.replace(/\s+/g, ' ');
            }
            return cleaned.split(' ').map(w =>
                w.toLowerCase() === 'egg' ? 'Egg' : w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()
            ).join(' ');
        }

        const serializeItem = item => item ? {
            type: convertName(item.type), rarity: item.rarity, level: item.level,
            count: item.count, durability: item.durability, maxDurability: item.maxDurability,
            isBroken: item.isBroken, reloadTime: item.reloadTime,
            baseReloadTime: item.baseReloadTime, armor: item.armor
        } : null;

        const allItems = {
            inventory: player.inventory.items.map(serializeItem),
            quickSlot: player.quickSlot.slots.map(serializeItem),
            secondarySlot: player.quickSlot.secondarySlots.map(serializeItem),
            timestamp: Date.now(), version: "3.0"
        };

        const blob = new Blob([JSON.stringify(allItems, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `flwrr_items_${Date.now()}.json`;
        a.click();
        URL.revokeObjectURL(url);
        alert(`✅ 已导出 ${player.inventory.items.length} 个物品`);
    };

    window.handleImportItems = () => {
        const game = window.gameInstance;
        if (!game || !game.player) { alert("请先进入游戏！"); return; }

        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.json';
        input.onchange = async (e) => {
            const file = e.target.files[0];
            const text = await file.text();
            const data = JSON.parse(text);
            const player = game.player;

            let ItemClass = window.Item || (typeof Item !== 'undefined' ? Item : null)
                || player.inventory.items[0]?.constructor
                || player.quickSlot.slots.find(s => s)?.constructor;
            if (!ItemClass) {
                try { const m = await import('./game.js'); ItemClass = m.Item; } catch(err) {}
            }
            if (!ItemClass) { alert("无法找到 Item 类，请确保游戏完全加载后再试"); return; }

            player.inventory.items = [];
            for (let i = 0; i < player.quickSlot.slots.length; i++) {
                player.quickSlot.slots[i] = null;
                if (player.petals[i]) player.petals[i].resetToDefault();
            }
            for (let i = 0; i < player.quickSlot.secondarySlots.length; i++) {
                player.quickSlot.secondarySlots[i] = null;
            }

            const restoreItem = (d, ItemClass) => {
                if (!d) return null;
                try {
                    const item = new ItemClass(d.type, d.level || 1, d.rarity);
                    item.count = d.count || 1;
                    if (d.durability) item.durability = d.durability;
                    if (d.maxDurability) item.maxDurability = d.maxDurability;
                    if (d.isBroken) item.isBroken = d.isBroken;
                    if (d.reloadTime) item.reloadTime = d.reloadTime;
                    if (d.baseReloadTime) item.baseReloadTime = d.baseReloadTime;
                    if (d.armor) item.armor = d.armor;
                    return item;
                } catch(err) { console.warn("跳过物品:", d.type, err); return null; }
            };

            for (const d of data.inventory || []) {
                const item = restoreItem(d, ItemClass);
                if (item) player.inventory.items.push(item);
            }
            for (let i = 0; i < (data.quickSlot || []).length && i < player.quickSlot.slots.length; i++) {
                const item = restoreItem(data.quickSlot[i], ItemClass);
                if (item) { player.quickSlot.slots[i] = item; player.petals[i]?.updateFromQuickSlot(i); }
            }
            for (let i = 0; i < (data.secondarySlot || []).length && i < player.quickSlot.secondarySlots.length; i++) {
                const item = restoreItem(data.secondarySlot[i], ItemClass);
                if (item) player.quickSlot.secondarySlots[i] = item;
            }

            player.inventory.cacheDirty = true;
            game.requestRedraw();
            if (game.autoSaveSystem?.saveGame) {
                game.autoSaveSystem.saveGame(player, { score: game.score || 0, enemiesKilled: game.enemiesKilled || 0, currentWave: 1 });
            }
            alert(`✅ 导入完成！共 ${player.inventory.items.length} 个物品`);
        };
        input.click();
    };

    window.handleClearAllItems = () => {
        const game = window.gameInstance;
        if (!game || !game.player) return;
        if (!confirm('⚠️ 警告：这将清除当前账号的所有物品！\n此操作不可恢复！\n\n确定要继续吗？')) return;
        const player = game.player;
        player.inventory.items = [];
        for (let i = 0; i < player.quickSlot.slots.length; i++) {
            player.quickSlot.slots[i] = null;
            if (player.petals[i]) player.petals[i].resetToDefault();
        }
        for (let i = 0; i < player.quickSlot.secondarySlots.length; i++) {
            player.quickSlot.secondarySlots[i] = null;
        }
        for (const petal of player.petals) {
            if (petal._clearAllSummons) petal._clearAllSummons();
            petal.eggSpawned = false;
        }
        player.inventory.cacheDirty = true;
        game.requestRedraw();
        if (game.autoSave) game.autoSave();
    };

    // ========== beforeunload 保存 ==========
    window.addEventListener('beforeunload', () => {
        const game = window.gameInstance;
        if (game?.autoSaveSystem && game?.player) {
            game.autoSaveSystem.saveToLocal(game.player, {
                score: game.score || 0,
                enemiesKilled: game.enemiesKilled || 0,
                currentWave: 1
            });
        }
    });

    // ========== 触摸穿透防护 ==========
    const uiContainers = [
        document.getElementById('multiplayer-panel'),
        document.getElementById('touch-controls'),
        document.getElementById('toggle-panel'),
        document.getElementById('orientation-tip')
    ];

    function blockTouchPropagation(e) {
        e.stopPropagation();
        if (e.target && (e.target.tagName === 'BUTTON' || e.target.classList?.contains('touch-btn'))) {
            e.preventDefault();
        }
    }
    uiContainers.forEach(container => {
        if (container) {
            container.addEventListener('touchstart', blockTouchPropagation, { passive: false });
            container.addEventListener('touchmove', blockTouchPropagation, { passive: false });
            container.addEventListener('touchend', blockTouchPropagation, { passive: false });
        }
    });

    const observer = new MutationObserver((mutations) => {
        mutations.forEach((mutation) => {
            mutation.addedNodes.forEach((node) => {
                if (node.nodeType === 1) {
                    if (node.style && (node.style.zIndex > 2000 || node.classList?.contains('dialog') || node.classList?.contains('panel') || node.classList?.contains('modal'))) {
                        node.addEventListener('touchstart', blockTouchPropagation, { passive: false });
                        node.addEventListener('touchmove', blockTouchPropagation, { passive: false });
                        node.addEventListener('touchend', blockTouchPropagation, { passive: false });
                    }
                }
            });
        });
    });
    observer.observe(document.body, { childList: true, subtree: true });

    function isTouchOnUI(x, y) {
        const uiElements = document.querySelectorAll('#multiplayer-panel, #touch-controls, #toggle-panel, .dialog, .modal, .shop-panel, .crafting-panel, .inventory-panel');
        for (let el of uiElements) {
            if (el && el.style.display !== 'none') {
                const rect = el.getBoundingClientRect();
                if (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) return true;
            }
        }
        return false;
    }

    // ========== 移动端安全检测 ==========
    let lastTouchTime = 0;
    const maxTouchPoints = 3;

    function isTrustedTouchEvent(e) {
        if (!e.isTrusted) return false;
        if (e.touches && e.touches.length > maxTouchPoints) return false;
        const now = Date.now();
        if (now - lastTouchTime < 16) return false;
        lastTouchTime = now;
        if (e.touches && e.touches.length > 0) {
            const touch = e.touches[0];
            if (touch.clientX < -1000 || touch.clientX > 10000 || touch.clientY < -1000 || touch.clientY > 10000) return false;
        }
        return true;
    }

    function blockTouchDefaults(e) {
        e.preventDefault();
        e.stopPropagation();
    }

    setInterval(() => {
        if (window.console && console.profile && console.profileEnd) {}
    }, 5000);

    const originalAddEventListener = EventTarget.prototype.addEventListener;
    EventTarget.prototype.addEventListener = function(type, listener, options) {
        if (type === 'touchstart' || type === 'touchend' || type === 'click' || type === 'touchmove') {
            if (typeof listener !== 'function') return originalAddEventListener.call(this, type, listener, options);
            const wrapped = function(e) {
                if (!e.isTrusted) { console.warn('Untrusted event blocked'); return; }
                return listener.apply(this, arguments);
            };
            return originalAddEventListener.call(this, type, wrapped, options);
        }
        return originalAddEventListener.call(this, type, listener, options);
    };

    function vibrate(ms = 15) {

    let screen = null, ctx = null, gameState = 'main_menu', gameInstance = null;

    function resizeCanvas() {
        const canvas = document.getElementById('gameCanvas');

    window.addEventListener('keyup', (e) => {

    window.addEventListener('resize', () => {

    window.URL_PARAMS = (() => {

    })();

    // ========== 触屏控制 ==========
    (function() {
        const isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
        const joystickArea = document.getElementById('joystick-area');
        const knob = document.getElementById('joystick-knob');
        const toggleJoystickBtn = document.getElementById('toggle-joystick');
        const togglePanelBtn = document.getElementById('toggle-panel');
        const controlsPanel = document.getElementById('touch-controls');
        const BASE_R = 70, KNOB_R = 27, CENTER = BASE_R;
        let joystickActive = false, joystickId = null, joyX = 0, joyY = 0;
        let joystickEnabled = true, panelVisible = true;

        const savedJoy = localStorage.getItem('joystickEnabled');
        if (savedJoy !== null) joystickEnabled = savedJoy === 'true';
        const savedPanel = localStorage.getItem('touchControlsVisible');
        if (savedPanel !== null) panelVisible = savedPanel === 'true';
        else panelVisible = isTouch;

        [joystickArea, document.getElementById('btn-space'), document.getElementById('btn-r'),
         document.getElementById('btn-esc'), toggleJoystickBtn, togglePanelBtn].forEach(el => {
            if (!el) return;
            ['touchstart','touchmove','touchend'].forEach(t => el.addEventListener(t, blockTouchDefaults, { passive: false }));
        });

        function setJoystickVisible(visible) {
            joystickEnabled = visible;
            if (visible) { joystickArea.classList.remove('hidden'); toggleJoystickBtn.classList.remove('hidden-mode'); toggleJoystickBtn.textContent = '🎮'; }
            else { joystickArea.classList.add('hidden'); toggleJoystickBtn.classList.add('hidden-mode'); toggleJoystickBtn.textContent = '❌'; }
            localStorage.setItem('joystickEnabled', visible);
        }
        function setPanelVisible(visible) {
            panelVisible = visible;
            if (visible) controlsPanel.classList.remove('hidden');
            else controlsPanel.classList.add('hidden');
            localStorage.setItem('touchControlsVisible', visible);
        }

        function updateKnob(dx, dy) {
            const dist = Math.sqrt(dx*dx+dy*dy);
            const maxDist = BASE_R - KNOB_R;
            const clamped = Math.min(dist, maxDist);
            const angle = Math.atan2(dy, dx);
            knob.style.left = (CENTER + Math.cos(angle)*clamped - KNOB_R) + 'px';
            knob.style.top  = (CENTER + Math.sin(angle)*clamped - KNOB_R) + 'px';
            joyX = dist > 5 ? Math.cos(angle) : 0;
            joyY = dist > 5 ? Math.sin(angle) : 0;
        }
        function resetKnob() {
            knob.style.left = (CENTER - KNOB_R) + 'px';
            knob.style.top  = (CENTER - KNOB_R) + 'px';
            joyX = 0; joyY = 0; joystickActive = false; joystickId = null;
        }

        joystickArea.addEventListener('touchstart', e => {
            if (joystickActive || !joystickEnabled) return;
            e.preventDefault();
            const t = e.changedTouches[0];
            joystickId = t.identifier; joystickActive = true;
            const rect = joystickArea.getBoundingClientRect();
            updateKnob(t.clientX - rect.left - CENTER, t.clientY - rect.top - CENTER);
        }, { passive: false });

        window.addEventListener('touchmove', e => {
            if (!joystickActive || !joystickEnabled) return;
            for (let i = 0; i < e.changedTouches.length; i++) {
                const t = e.changedTouches[i];
                if (t.identifier === joystickId) {
                    const rect = joystickArea.getBoundingClientRect();
                    updateKnob(t.clientX - rect.left - CENTER, t.clientY - rect.top - CENTER);
                    if (e.cancelable) e.preventDefault();
                }
            }
        }, { passive: false });

        window.addEventListener('touchend', e => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                if (e.changedTouches[i].identifier === joystickId) resetKnob();
            }
        }, { passive: false });

        window.addEventListener('touchcancel', e => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                if (e.changedTouches[i].identifier === joystickId) resetKnob();
            }
        }, { passive: false });

        let lastMoveTime = 0;
        function updateMovement(now) {
            if (!joystickActive || (Math.abs(joyX) < 0.1 && Math.abs(joyY) < 0.1)) { requestAnimationFrame(updateMovement); return; }
            if (!lastMoveTime) { lastMoveTime = now; requestAnimationFrame(updateMovement); return; }
            const dt = Math.min(0.033, (now - lastMoveTime) / 1000);
            lastMoveTime = now;
            const game = window.gameInstance;
            if (game?.player?.physicsBody) {
                const p = game.player;
                const speed = (p.speed || 80) * (p.slowMultiplier || 1);
                if (joyX !== 0 || joyY !== 0) {
                    const len = Math.hypot(joyX, joyY);
                    p.physicsBody.position.x += (joyX / len) * speed * dt;
                    p.physicsBody.position.y += (joyY / len) * speed * dt;
                }
                const ww = window.WORLD_WIDTH || 10000, wh = window.WORLD_HEIGHT || 10000;
                p.physicsBody.position.x = Math.max(30, Math.min(ww - 30, p.physicsBody.position.x));
                p.physicsBody.position.y = Math.max(30, Math.min(wh - 30, p.physicsBody.position.y));
                if (game.cameraOffset) {
                    game.cameraOffset.x = p.physicsBody.position.x - window.WIDTH / 2;
                    game.cameraOffset.y = p.physicsBody.position.y - window.HEIGHT / 2;
                }
            }
            requestAnimationFrame(updateMovement);
        }
        requestAnimationFrame(updateMovement);

        function bindBtn(id, fn) {
            const el = document.getElementById(id);
            if (!el) return;
            el.addEventListener('touchstart', e => {
                if (!isTrustedTouchEvent(e)) { e.preventDefault(); return; }
                e.preventDefault(); vibrate(10); fn();
            }, { passive: false });
            el.addEventListener('click', e => { e.preventDefault(); fn(); });
        }
        function fakeKey(key) { document.dispatchEvent(new KeyboardEvent('keydown', { key, bubbles: true })); }

        bindBtn('btn-space', () => { window.gameInstance?.player?.toggleSpreadMode?.(); });
        bindBtn('btn-r', () => {
            const g = window.gameInstance;
            if (g?.player?.quickSlot?.swapAllSlots) g.player.quickSlot.swapAllSlots();
            else fakeKey('r');
        });
        bindBtn('btn-esc', () => {
            const g = window.gameInstance;
            if (g?.returnToMainMenu) g.returnToMainMenu();
            else fakeKey('Escape');
        });

        toggleJoystickBtn.addEventListener('click', () => setJoystickVisible(!joystickEnabled));
        togglePanelBtn.addEventListener('click', () => setPanelVisible(!panelVisible));
        setJoystickVisible(joystickEnabled);
        setPanelVisible(panelVisible);
    })();

    // ===== 游戏初始化 =====
    function createGameInstance() {
        try {
            const game = new WorldMapGame();
            gameInstance = game;
            window.gameInstance = game;
            if (window.URL_PARAMS?.roomCode) {
                setTimeout(async () => {
                    try { await game.joinMultiplayerRoom(window.URL_PARAMS.roomCode); startGame('Plain'); }
                    catch(e) { console.error(e); }
                }, 2000);
            }
            return game;
        } catch(e) { console.error(e); return null; }
    }

    function getCanvasCoordinates(e) {
        const rect = screen.getBoundingClientRect();
        const sx = screen.width / rect.width, sy = screen.height / rect.height;
        return { x: (e.clientX - rect.left) * sx, y: (e.clientY - rect.top) * sy };
    }
    function resetMouseMove() { mouseTargetX = mouseTargetY = null; isMouseMoving = false; }
    function setMouseTarget(x, y) {
        if (gameState === 'in_game' && gameInstance?.player) {
            mouseTargetX = x + (gameInstance.cameraOffset?.x || 0);
            mouseTargetY = y + (gameInstance.cameraOffset?.y || 0);
            isMouseMoving = true;
        }
    }
    function updatePlayerMovementByMouse() {
        if (!isMouseMoving || !gameInstance?.player || mouseTargetX === null) return;
        const p = gameInstance.player;
        const px = p.physicsBody?.position?.x || 0, py = p.physicsBody?.position?.y || 0;
        const dx = mouseTargetX - px, dy = mouseTargetY - py;
        const dist = Math.hypot(dx, dy);
        if (dist < MOUSE_MOVE_SPEED) {
            if (p.physicsBody) { p.physicsBody.position.x = mouseTargetX; p.physicsBody.position.y = mouseTargetY; }
            resetMouseMove();
        } else {
            const ang = Math.atan2(dy, dx);
            if (p.physicsBody) { p.physicsBody.position.x += Math.cos(ang) * MOUSE_MOVE_SPEED; p.physicsBody.position.y += Math.sin(ang) * MOUSE_MOVE_SPEED; }
        }
        if (gameInstance.cameraOffset) {
            gameInstance.cameraOffset.x = (p.physicsBody?.position?.x || 0) - window.WIDTH / 2;
            gameInstance.cameraOffset.y = (p.physicsBody?.position?.y || 0) - window.HEIGHT / 2;
        }
    }

    function isPointInInventoryArea(x, y) { return x >= 0 && x <= 400; }
    function isPointInCloseButton(x, y) { return Math.hypot(x - 370, y - 30) <= 15; }

    function openInventory() {
        if (!gameInstance?.player?.inventory) { alert('Start a game first.'); return; }
        if (gameInstance.player.inventory.craftingSystem) gameInstance.player.inventory.craftingSystem.craftingVisible = false;
        gameState = 'inventory';
    }
    function openCrafting() {
        if (!gameInstance?.player?.inventory?.craftingSystem) { alert('Start a game first.'); return; }
        gameInstance.player.inventory.craftingSystem.craftingVisible = true;
        gameState = 'crafting';
    }
    function closeInventory() {
        gameState = (gameInstance?.gameState === 'in_game') ? 'in_game' : 'main_menu';
    }
    function closeCrafting() {
        if (gameInstance?.player?.inventory?.craftingSystem) gameInstance.player.inventory.craftingSystem.craftingVisible = false;
        gameState = (gameInstance?.gameState === 'in_game') ? 'in_game' : 'main_menu';
    }
    window.closeCrafting = closeCrafting;

    function handleMouseDown(e) {
        e.preventDefault();
        const { x, y } = getCanvasCoordinates(e);
        if (isTouchOnUI(e.clientX, e.clientY)) return;

        if (gameState === 'in_game' && e.button === 2) setMouseTarget(x, y);
        const ev = { type: 'mousedown', button: e.button, x, y };

        // Changelog
        if (gameState === 'main_menu' && gameInstance?.mainMenu?.changelog?.visible) {
            if (gameInstance.mainMenu.changelog.handleClick(x, y)) return;
        }

        // 账号面板（Canvas绘制版，由AccountSystem处理）
        if (gameState === 'main_menu' && gameInstance?.accountSystem?.panelOpen) {
            if (gameInstance.accountSystem.handleClick(x, y)) return;
        }

        // 设置面板
        if (gameState === 'main_menu' && gameInstance?.mainMenu?.settingsPanelOpen && gameInstance?.mainMenu?.settingsPanelRect) {
            const [px, py, pw, ph] = gameInstance.mainMenu.settingsPanelRect;
            if (x >= px && x <= px + pw && y >= py && y <= py + ph) {
                if (gameInstance.mainMenu.settings) {
                    gameInstance.mainMenu.settings.handleClick(x, y);
                    if (!gameInstance.mainMenu.settings.panelOpen) gameInstance.mainMenu.settingsPanelOpen = false;
                }
                return;
            }
        }

        // Mob Gallery
        if (gameState === 'mob_gallery' && gameInstance?.mobGallery) {
            if (gameInstance.mobGallery.handleClick(x, y)) gameState = 'main_menu';
            return;
        }

        // Talent system
        if (gameInstance?.talentSystem?.panelOpen) {
            const result = gameInstance.talentSystem.handleClick([x, y]);
            if (result === 'talent_levelup' || result === 'talent_no_points' || result === 'talent_close' || result === 'talent_reset') return;
        }

        if (gameState === 'main_menu' && gameInstance) {
            if (gameInstance.shopSystem?.visible) { gameInstance.shopSystem.handleClick([x,y]); return; }

            // Mob gallery button
            if (x >= 20 && x <= 120 && y >= 200 && y <= 235) {
                if (gameInstance.mobGallery) { gameInstance.mobGallery.open(); gameState = 'mob_gallery'; }
                return;
            }

            const res = gameInstance.mainMenu.handleClick(ev);
            if (res) {
                switch(res) {
                    case "shop": if(gameInstance.shopSystem) gameInstance.shopSystem.visible = true; break;
                    case "crafting": openCrafting(); break;
                    case "inventory": openInventory(); break;
                    case "multiplayer": showMultiplayerPanel(); break;
                    case "account":
                        if (gameInstance.accountSystem) gameInstance.accountSystem.openPanel();
                        break;
                    case "bonus": gameInstance.bonusSystem?.claimBonus(); break;
                    default:
                        if (res?.startsWith('start_') && res?.endsWith('_map')) {
                            let bio = res.replace('start_','').replace('_map','');
                            bio = bio.charAt(0).toUpperCase() + bio.slice(1);
                            startGame(bio);
                        } else if (res === 'start_maze') startMazeMode();
                }
            }
        } else if (gameState === 'in_game' && gameInstance) {
            if (gameInstance.player?.quickSlot?.handleClick([x,y])) return;
            gameInstance.handleEvents?.(ev);
        } else if (gameState === 'crafting' && gameInstance?.player?.inventory?.craftingSystem) {
            gameInstance.player.inventory.craftingSystem.handleMouseDown?.([x,y]);
        } else if (gameState === 'inventory' && gameInstance?.player?.inventory) {
            if (isPointInCloseButton(x,y)) closeInventory();
            else if (isPointInInventoryArea(x,y)) gameInstance.player.inventory.handleMouseDown?.([x,y]);
        }
    }

    function handleMouseUp(e) {
        e.preventDefault();
        if (isTouchOnUI(e.clientX, e.clientY)) return;
        const { x, y } = getCanvasCoordinates(e);
        const ev = { type: 'mouseup', button: e.button, x, y };
        if (gameState === 'in_game' && gameInstance?.handleEvents) {
            gameInstance.handleEvents(ev);
            gameInstance.handleEvents({ type: 'click', x, y });
        } else if (gameState === 'crafting' && gameInstance?.player?.inventory?.craftingSystem) {
            const c = gameInstance.player.inventory.craftingSystem;
            c.handleModeClick?.([x, y]);
            c.handleMouseUp?.([x,y]);
            c.handleClick?.([x,y]);
        } else if (gameState === 'inventory' && gameInstance?.player?.inventory) {
            if (isPointInCloseButton(x,y)) closeInventory();
            else if (isPointInInventoryArea(x,y)) {
                gameInstance.player.inventory.handleMouseUp?.([x,y]);
                gameInstance.player.inventory.handleClick([x,y]);
            }
        }
    }

    function handleMouseMove(e) {
        e.preventDefault();
        if (isTouchOnUI(e.clientX, e.clientY)) return;
        const { x, y } = getCanvasCoordinates(e);
        window.mouseX = x; window.mouseY = y;

        if (gameState === 'mob_gallery' && gameInstance?.mobGallery) {
            gameInstance.mobGallery.handleMouseMove(x, y);
            return;
        }
        if (gameState === 'main_menu' && gameInstance?.mainMenu?.handleMouseMove) {
            gameInstance.mainMenu.handleMouseMove({ type: 'mousemove', x, y });
            if (gameInstance.shopSystem) { gameInstance.shopSystem.mouseX = x; gameInstance.shopSystem.mouseY = y; }
            // 账号面板悬停
            gameInstance.accountSystem?.handleMouseMove?.(x, y);
        } else if (gameState === 'in_game' && gameInstance?.handleEvents) {
            gameInstance.handleEvents({ type: 'mousemove', x, y });
            gameInstance.player?.updateMousePosition?.(x, y);
            if (gameInstance.player?.inventory) { gameInstance.player.inventory.mouseX = x; gameInstance.player.inventory.mouseY = y; }
            if (gameInstance.player?.quickSlot) { gameInstance.player.quickSlot.mouseX = x; gameInstance.player.quickSlot.mouseY = y; }
            if (gameInstance.shopSystem) { gameInstance.shopSystem.mouseX = x; gameInstance.shopSystem.mouseY = y; }
        } else if (gameState === 'crafting' && gameInstance?.player?.inventory?.craftingSystem) {
            const c = gameInstance.player.inventory.craftingSystem;
            c.handleModeClick?.([x, y]);
            c.handleMouseMove?.([x,y]);
            c.mouseX = x; c.mouseY = y;
        } else if (gameState === 'inventory' && gameInstance?.player?.inventory) {
            gameInstance.player.inventory.mouseX = x; gameInstance.player.inventory.mouseY = y;
            if (isPointInInventoryArea(x,y)) gameInstance.player.inventory.handleMouseMove?.([x,y]);
        }
    }

    function handleWheel(e) {
        e.preventDefault(); e.stopPropagation();
        if (isTouchOnUI(e.clientX, e.clientY)) return;
        const { x, y } = getCanvasCoordinates(e);
        const we = { type: 'wheel', deltaY: e.deltaY, x, y };
        if (gameState === 'mob_gallery' && gameInstance?.mobGallery) { gameInstance.mobGallery.handleWheel(e.deltaY); return; }
        if (gameInstance?.talentSystem?.handleScroll(e.deltaY)) { e.preventDefault(); return; }
        if (gameState === 'main_menu' && gameInstance?.mainMenu?.changelog?.visible) { gameInstance.mainMenu.changelog.handleScroll(e.deltaY); return; }
        if (gameState === 'main_menu' && gameInstance?.shopSystem?.visible) gameInstance.shopSystem.handleClick?.(we);
        else if (gameState === 'in_game' && gameInstance?.handleEvents) gameInstance.handleEvents(we);
        else if (gameState === 'crafting' && gameInstance?.player?.inventory?.craftingSystem) gameInstance.player.inventory.craftingSystem.handleScrollWheel?.(e);
        else if (gameState === 'inventory' && gameInstance?.player?.inventory) {
            if (isPointInInventoryArea(x,y)) gameInstance.player.inventory.handleScrollWheel?.(e);
        }
    }

    function initializePlayerControls() {
        if (controlsInitialized) {
            screen.removeEventListener('mousedown', handleMouseDown);
            screen.removeEventListener('mouseup', handleMouseUp);
            screen.removeEventListener('mousemove', handleMouseMove);
            screen.removeEventListener('wheel', handleWheel);
        }
        screen.addEventListener('mousedown', handleMouseDown);
        screen.addEventListener('mouseup', handleMouseUp);
        screen.addEventListener('mousemove', handleMouseMove);
        screen.addEventListener('wheel', handleWheel, { passive: false });
        screen.addEventListener('contextmenu', e => e.preventDefault());
        controlsInitialized = true;
    }

    function handleKeyDown(e) {
        if (!e?.key) return;
        if (gameInstance?.shopSystem?.redeemSystem?.inputVisible && gameInstance.shopSystem.redeemSystem.inputActive) {
            if (gameInstance.shopSystem.redeemSystem.handleKeyDown(e)) { e.preventDefault(); return; }
        }
        // 账号面板输入框键盘事件
        if (gameInstance?.accountSystem?.panelOpen && gameInstance.accountSystem.handleKeyDown?.(e)) {
            e.preventDefault(); return;
        }
        const k = e.key;
        if (k === 't' || k === 'T') {
            if (gameInstance?.multiplayerMode && gameInstance?.network?.chatSystem) {
                gameInstance.toggleChat();
                if (gameInstance.chatVisible) gameInstance.network.chatSystem.inputActive = true;
            }
            e.preventDefault(); return;
        }
        if (k === 'Shift') {
            e.preventDefault(); e.stopPropagation();
            if (gameState === 'in_game' && gameInstance?.player && !gameInstance.paused) gameInstance.player.contractMode = true;
            return;
        }
        if (k >= '1' && k <= '9') {
            if (gameState === 'in_game' && gameInstance?.player?.quickSlot) {
                gameInstance.player.quickSlot.swapSlot(parseInt(k) - 1);
            }
            e.preventDefault(); return;
        }
        if (k === '0') {
            if (gameState === 'in_game' && gameInstance?.player?.quickSlot) gameInstance.player.quickSlot.swapSlot(9);
            e.preventDefault(); return;
        }
        if (k === ' ' || k === 'Space') {
            if (gameState === 'in_game' && gameInstance?.player) gameInstance.player.toggleSpreadMode();
            e.preventDefault(); return;
        }
        if (k === 'c' || k === 'C') {
            if (gameState === 'in_game') openCrafting();
            else if (gameState === 'crafting') { gameState = 'in_game'; gameInstance?.player?.inventory?.craftingSystem && (gameInstance.player.inventory.craftingSystem.craftingVisible = false); }
            e.preventDefault(); return;
        }
        if (k === 'i' || k === 'I') {
            if (gameState === 'in_game') openInventory();
            else if (gameState === 'inventory') gameState = 'in_game';
            e.preventDefault(); return;
        }
        if (k === 'b' || k === 'B') {
            if (gameState === 'in_game' && gameInstance?.bonusSystem) gameInstance.bonusSystem.claimBonus();
            e.preventDefault(); return;
        }
        if (k === 's' || k === 'S') {
            const g = window.gameInstance;
            if (g?.gameState === 'in_game' && !g.paused && g.player) {
                e.preventDefault(); e.stopPropagation();
                for (const p of g.player.petals) if (p.toggleStillMode) p.toggleStillMode();
            }
            return;
        }
        if (k === 'r' || k === 'R') {
            if (gameState === 'in_game' && gameInstance?.player?.quickSlot) gameInstance.player.quickSlot.swapAllSlots();
            e.preventDefault(); return;
        }
        if (k === 'd' || k === 'D') {
            if (gameState === 'in_game' && gameInstance) gameInstance.debugMode = !gameInstance.debugMode;
            e.preventDefault(); return;
        }
        if (k === 'p' || k === 'P') {
            if (gameState === 'in_game' && gameInstance) gameInstance.paused = !gameInstance.paused;
            e.preventDefault(); return;
        }
        if (k === 'Escape') {
            e.preventDefault(); e.stopPropagation();
            // 先让账号面板处理 Escape
            if (gameInstance?.accountSystem?.panelOpen) { gameInstance.accountSystem.closePanel(); return; }
            if (gameState !== 'main_menu') returnToMainMenu();
            else if (gameInstance?.shopSystem?.visible) gameInstance.shopSystem.visible = false;
            return;
        }
        if (['w','W','a','A','s','S','d','D','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(k)) {
            resetMouseMove(); e.preventDefault(); return;
        }
    }

    function handleKeyUp(e) {
        if (!e?.key) return;
        if (e.key === 'Shift') {
            e.preventDefault();
            if (gameInstance?.player) gameInstance.player.contractMode = false;
        }
    }

    let isProcessingEscape = false;
    function returnToMainMenu() {
        if (isProcessingEscape) return;
        isProcessingEscape = true;

        if (gameState === 'crafting' && gameInstance?.player?.inventory?.craftingSystem) {
            gameInstance.player.inventory.craftingSystem.craftingVisible = false;
        }
        if (gameInstance?.shopSystem?.visible) gameInstance.shopSystem.visible = false;
        if (document.getElementById('multiplayer-panel')?.style.display === 'block') hideMultiplayerPanel();

        // 恢复 Mimic
        if (gameInstance?.player?.quickSlot) {
            const qs = gameInstance.player.quickSlot;
            if (typeof qs.restoreAllMimics === 'function') {
                qs.restoreAllMimics();
            } else {
                for (const slots of [qs.slots, qs.secondarySlots]) {
                    for (const item of slots) {
                        if (item?._originalMimicData?.type === "Mimic") {
                            const od = item._originalMimicData;
                            Object.assign(item, { type: od.type, rarity: od.rarity, level: od.level,
                                durability: od.durability, maxDurability: od.maxDurability,
                                reloadTime: od.reloadTime, baseReloadTime: od.baseReloadTime, armor: od.armor });
                            item._originalMimicData = null;
                            item._isTransformedMimic = false;
                        }
                    }
                }
            }
            if (gameInstance.player._mimicBackups) gameInstance.player._mimicBackups = {};
            if (gameInstance._mimicBackups) gameInstance._mimicBackups = {};
        }

        if (gameInstance?.autoSave) gameInstance.autoSave();

        gameState = 'main_menu';
        editorMode = false;
        if (gameInstance) { gameInstance.gameState = 'main_menu'; gameInstance.paused = false; }
        resetMouseMove();
        if (typeof hideMask === 'function') hideMask();

        setTimeout(() => { isProcessingEscape = false; }, 100);
    }
    window.returnToMainMenu = returnToMainMenu;

    async function startGame(biome) {
        if (!gameInstance) gameInstance = createGameInstance();
        if (!gameInstance) { alert('Failed to create game instance!'); return; }
        try {
            if (typeof WORLD_WIDTH === 'undefined') window.WORLD_WIDTH = 5000;
            if (typeof WORLD_HEIGHT === 'undefined') window.WORLD_HEIGHT = 5000;
            await gameInstance.startGame(biome);
            gameState = 'in_game';
            editorMode = false;
            if (!controlsInitialized) initializePlayerControls();
            resetMouseMove();
        } catch(e) { console.error(e); alert('Failed to start game: ' + e.message); }
    }

    async function startMazeMode() {
        if (!gameInstance) gameInstance = createGameInstance();
        if (!gameInstance) { alert('Failed to create game instance!'); return; }
        try {
            if (typeof MAZE_WIDTH === 'undefined') window.MAZE_WIDTH = 10000;
            if (typeof MAZE_HEIGHT === 'undefined') window.MAZE_HEIGHT = 10000;
            gameInstance.startMazeMode();
            gameState = 'in_game';
            editorMode = true;
            if (!controlsInitialized) initializePlayerControls();
            resetMouseMove();
        } catch(e) { console.error(e); alert('Failed to start maze mode: ' + e.message); }
    }

    function gameLoop() {
        animationFrameId = requestAnimationFrame(gameLoop);
        if (!gameInstance) return;
        const dt = 16.67 / 1000;
        if (gameState === 'in_game') updatePlayerMovementByMouse();
        if (gameState === 'in_game' && gameInstance.update) gameInstance.update(dt);
        else if (gameState === 'crafting' && gameInstance.player?.inventory?.craftingSystem?.update) gameInstance.player.inventory.craftingSystem.update(dt);
        else if (gameState === 'inventory' && gameInstance.player?.inventory?.update) gameInstance.player.inventory.update(dt);
        if (gameState === 'main_menu' && gameInstance?.mainMenu) gameInstance.mainMenu.updateFloatingPetals(dt);

        if (gameState === 'main_menu') {
            ctx.clearRect(0, 0, screen.width, screen.height);
            ctx.fillStyle = '#1a1a2e'; ctx.fillRect(0, 0, screen.width, screen.height);
            if (gameInstance?.mainMenu) {
                gameInstance.mainMenu.draw(ctx);
                if (gameInstance.shopSystem?.visible) { gameInstance.shopSystem.update(); gameInstance.shopSystem.draw(ctx); }
                // Maze mode button
                ctx.save();
                const bw = 200, bh = 50, bx = screen.width/2 - bw/2, by = screen.height/2 + 440;
                ctx.fillStyle = '#8B4513'; ctx.fillRect(bx, by, bw, bh);
                ctx.strokeStyle = '#CD853F'; ctx.strokeRect(bx, by, bw, bh);
                drawButtonTextWithBorder(ctx, 'MAZE MODE', bx, by, bw, bh, { font: 'bold 20px "Arial", sans-serif', fillColor: '#FFD700' });
                ctx.restore();
                // 账号面板由 AccountSystem 自行绘制
                if (gameInstance.accountSystem?.panelOpen) gameInstance.accountSystem.draw?.(ctx);
            } else drawFallbackMenu(ctx);
        } else if (gameState === 'in_game') {
            ctx.clearRect(0, 0, screen.width, screen.height);
            gameInstance.draw(ctx);
            let hints = '右键点击地面移动 | C:合成 | I:背包 | ESC:菜单 | S:静止 | T:聊天';
            if (gameInstance.useMaze) hints = '🗺️ 迷宫模式 | E:编辑器 | S:保存 | L:加载 | M:面板 | ' + hints;
            drawTextWithBorder(ctx, hints, 10, 20, { font: '12px "Arial", sans-serif', textAlign: 'left', textBaseline: 'top', borderWidth: 2 });
            if (isMouseMoving && mouseTargetX !== null && mouseTargetY !== null && gameInstance.cameraOffset) {
                const sx = mouseTargetX - gameInstance.cameraOffset.x, sy = mouseTargetY - gameInstance.cameraOffset.y;
                if (sx >= 0 && sx <= screen.width && sy >= 0 && sy <= screen.height) {
                    ctx.save();
                    ctx.strokeStyle = 'rgba(255,255,0,0.8)'; ctx.fillStyle = 'rgba(255,255,0,0.3)'; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.arc(sx, sy, 15, 0, Math.PI*2); ctx.stroke();
                    ctx.beginPath(); ctx.arc(sx, sy, 8, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.moveTo(sx-20,sy); ctx.lineTo(sx+20,sy); ctx.moveTo(sx,sy-20); ctx.lineTo(sx,sy+20);
                    ctx.strokeStyle = 'rgba(255,255,0,0.5)'; ctx.stroke();
                    ctx.restore();
                }
            }
        } else if (gameState === 'crafting' && gameInstance.player?.inventory?.craftingSystem) {
            ctx.fillStyle = '#16213e'; ctx.fillRect(0, 0, screen.width, screen.height);
            ctx.globalAlpha = 0.3; gameInstance.draw(ctx); ctx.globalAlpha = 1.0;
            const cs = gameInstance.player.inventory.craftingSystem;
            cs.craftingVisible = true; cs.draw(ctx);
            drawTextWithBorder(ctx, 'ESC: 返回游戏', 10, 20, { font: '12px "Arial", sans-serif', textAlign: 'left', textBaseline: 'top', borderWidth: 2 });
        } else if (gameState === 'inventory' && gameInstance.player?.inventory) {
            gameInstance.draw(ctx);
            ctx.save();
            ctx.fillStyle = '#ff6b6b'; ctx.beginPath(); ctx.arc(370, 30, 15, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = 'white'; ctx.lineWidth = 2; ctx.stroke();
            drawTextWithBorder(ctx, 'X', 370, 30, { font: 'bold 18px "Arial", sans-serif', textAlign: 'center', textBaseline: 'middle', borderWidth: 2, fillColor: 'white' });
            if (gameInstance.player.inventory.draw) gameInstance.player.inventory.draw(ctx);
            ctx.restore();
            gameInstance.player?.quickSlot?.draw(ctx);
            drawTextWithBorder(ctx, '点击物品添加到快捷栏 | ESC: 返回游戏', 10, screen.height - 10, { font: '12px "Arial", sans-serif', textAlign: 'left', textBaseline: 'bottom', borderWidth: 2 });
        }
    }

    function drawFallbackMenu(ctx) {
        ctx.fillStyle = '#1a1a2e'; ctx.fillRect(0, 0, screen.width, screen.height);
        drawTextWithBorder(ctx, '🌸 flwrr 🌸', screen.width/2, screen.height/2-100, { font: '48px "Arial", sans-serif', textAlign: 'center', textBaseline: 'middle', borderWidth: 4 });
        drawTextWithBorder(ctx, 'Click to Start', screen.width/2, screen.height/2, { font: '24px "Arial", sans-serif', textAlign: 'center', textBaseline: 'middle', borderWidth: 3, fillColor: '#888' });
        const btns = [
            { text:'Plain', y:screen.height/2+80 }, { text:'Bio', y:screen.height/2+140 },
            { text:'Desert', y:screen.height/2+200 }, { text:'Random', y:screen.height/2+260 },
            { text:'Crafting', y:screen.height/2+320 }, { text:'Inventory', y:screen.height/2+380 },
            { text:'MAZE MODE', y:screen.height/2+440, color:'#8B4513' }
        ];
        btns.forEach(b => {
            ctx.fillStyle = b.color || '#4a4a6a';
            const bw = 200, bh = 50, bx = screen.width/2 - bw/2;
            ctx.fillRect(bx, b.y, bw, bh);
            ctx.strokeStyle = b.color ? '#CD853F' : '#6a6a8a';
            ctx.strokeRect(bx, b.y, bw, bh);
            drawButtonTextWithBorder(ctx, b.text, bx, b.y, bw, bh, { font: 'bold 20px "Arial", sans-serif', fillColor: b.text === 'MAZE MODE' ? '#FFD700' : 'white', borderWidth: 2 });
        });
    }

    function drawTextWithBorder(ctx, txt, x, y, opt = {}) {
        const { font='24px Arial', align='center', baseline='middle', border='black', bw=3, fill='white' } = opt;
        ctx.save();
        ctx.font = font; ctx.textAlign = align; ctx.textBaseline = baseline;
        ctx.shadowColor = border; ctx.shadowBlur = bw;
        ctx.fillStyle = fill; ctx.fillText(txt, x, y);
        ctx.shadowBlur = 0; ctx.fillText(txt, x, y);
        ctx.restore();
    }
    function drawButtonTextWithBorder(ctx, txt, x, y, w, h, opt = {}) {
        drawTextWithBorder(ctx, txt, x+w/2, y+h/2, { font: opt.font || 'bold 20px Arial', align: 'center', baseline: 'middle', border: opt.borderColor || 'black', bw: opt.borderWidth || 3, fill: opt.fillColor || 'white' });
    }

    // ===== 启动 =====
    initDOMElements();
    resizeCanvas();
    checkOrientation();
    gameInstance = createGameInstance();
    gameLoop();
    initializePlayerControls();
    document.addEventListener('keydown', handleKeyDown);
    document.addEventListener('keyup', handleKeyUp);
    document.getElementById('orientation-tip')?.addEventListener('click', () => {
        document.getElementById('orientation-tip').classList.add('hidden');
    });

    // ========== 多人游戏面板 ==========
    window.showMultiplayerPanel = () => {
        const panel = document.getElementById('multiplayer-panel');
        if (panel) panel.style.display = 'flex';
        document.getElementById('mp-menu').style.display = 'block';
        document.getElementById('mp-create').style.display = 'none';
        document.getElementById('mp-join').style.display = 'none';
    };
    window.hideMultiplayerPanel = () => {
        const panel = document.getElementById('multiplayer-panel');
        if (panel) panel.style.display = 'none';
    };
    window.showCreateRoom = async () => {
        document.getElementById('mp-menu').style.display = 'none';
        document.getElementById('mp-create').style.display = 'block';
        if (!gameInstance) gameInstance = createGameInstance();
        try {
            const code = await gameInstance.createMultiplayerRoom();
            document.getElementById('room-code-display').textContent = code;
            document.getElementById('room-link-display').textContent = `${location.href.split('?')[0]}?room=${code}`;
            const ri = document.getElementById('room-info');
            if (ri) { ri.style.display = 'block'; ri.innerHTML = `🎮 房间: ${code} | 等待玩家加入...`; }
        } catch(e) { alert('创建房间失败: ' + e.message); backToMenu(); }
    };
    window.showJoinRoom = () => {
        document.getElementById('mp-menu').style.display = 'none';
        document.getElementById('mp-join').style.display = 'block';
        document.getElementById('room-code-input')?.focus();
    };
    window.backToMenu = () => {
        document.getElementById('mp-menu').style.display = 'block';
        document.getElementById('mp-create').style.display = 'none';
        document.getElementById('mp-join').style.display = 'none';
        document.getElementById('join-error').textContent = '';
    };
    window.copyRoomLink = () => {
        const text = document.getElementById('room-link-display')?.textContent;
        if (text) { navigator.clipboard.writeText(text); alert('✅ 链接已复制！'); }
    };
    window.joinRoom = async () => {
        const code = document.getElementById('room-code-input')?.value.toUpperCase() || '';
        if (code.length < 4) { document.getElementById('join-error').textContent = '请输入有效的房间号'; return; }
        if (!gameInstance) gameInstance = createGameInstance();
        try {
            await gameInstance.joinMultiplayerRoom(code);
            hideMultiplayerPanel();
            const ri = document.getElementById('room-info');
            if (ri) { ri.style.display = 'block'; ri.innerHTML = `🎮 房间: ${code} | 已加入`; }
            startGame('Plain');
        } catch(e) { document.getElementById('join-error').textContent = '加入失败: ' + e.message; }
    };
    </script>
</body>
</html>
