
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>Flwrr</title>
<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: 'Arial', sans-serif;
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  color: white;
  touch-action: pan-x pan-y; /* 允许滚动，但游戏区域会处理 */
}
#gameCanvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 1000;
  cursor: default;
  touch-action: none;
}

/* ========== 手机版自适应样式 ========== */
@media (max-width: 768px) {
  .touch-btn {
    width: 55px;
    height: 55px;
    font-size: 14px;
  }
  #joystick-area {
    width: 120px;
    height: 120px;
  }
  #joystick-base {
    width: 120px;
    height: 120px;
  }
  #joystick-knob {
    width: 46px;
    height: 46px;
    top: 37px;
    left: 37px;
  }
  #toggle-joystick, #toggle-panel {
    width: 40px;
    height: 40px;
    font-size: 18px;
  }
  #touch-hint {
    font-size: 9px;
    white-space: nowrap;
  }
  #btn-area {
    gap: 10px;
  }
}

/* ========== 触屏控制样式 ========== */
#touch-controls {
  display: block;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 200px;
  z-index: 3000;
  pointer-events: none;
  user-select: none;
}
#touch-controls.hidden { display: none; }

/* 虚拟摇杆 */
#joystick-area {
  position: absolute;
  bottom: 20px; left: 20px;
  width: 140px; height: 140px;
  pointer-events: all;
}
#joystick-area.hidden { display: none; }
#joystick-base {
  position: absolute;
  width: 140px; height: 140px;
  border-radius: 50%;
  background: rgba(255,255,255,0.12);
  border: 2px solid rgba(255,255,255,0.3);
}
#joystick-knob {
  position: absolute;
  width: 54px; height: 54px;
  border-radius: 50%;
  background: rgba(255,255,255,0.45);
  border: 2px solid rgba(255,255,255,0.7);
  top: 43px; left: 43px;
  transition: none;
  pointer-events: none;
}

/* 右侧按钮区域 - 调整位置避免被遮挡 */
#btn-area {
  position: absolute;
  bottom: 80px;  /* 向上移动，避免被键盘遮挡 */
  right: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  align-items: flex-end;
  pointer-events: all;
}
.touch-btn {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: bold;
  color: white;
  border: 2px solid rgba(255,255,255,0.5);
  cursor: pointer;
  pointer-events: all;
  user-select: none;
  transition: transform 0.08s, opacity 0.08s;
}
.touch-btn:active { transform: scale(0.88); opacity: 0.7; }
#btn-space { background: rgba(100,200,100,0.55); }
#btn-r     { background: rgba(180,80,180,0.55); }
#btn-esc   { background: rgba(200,60,60,0.55); }
#btn-b     { background: rgba(50,150,200,0.55); }  /* 新增 B 按钮（收缩模式） */

/* 切换按钮 */
#toggle-joystick {
  position: absolute;
  bottom: 20px;
  left: 180px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(0,0,0,0.5);
  border: 2px solid rgba(255,255,255,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  cursor: pointer;
  pointer-events: all;
  z-index: 3001;
}
#toggle-joystick:active { transform: scale(0.9); }
#toggle-joystick.hidden-mode { background: rgba(0,150,0,0.5); border-color: #0f0; }

#toggle-panel {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(0,0,0,0.6);
  border: 2px solid rgba(255,255,255,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  cursor: pointer;
  pointer-events: all;
  z-index: 3100;
}

/* 提示信息 - 移到顶部避免被键盘遮挡 */
#touch-hint {
  position: fixed;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.6);
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 11px;
  color: #aaa;
  pointer-events: none;
  z-index: 3001;
  white-space: nowrap;
}

/* 原有面板样式 */
#multiplayer-panel, #account-panel {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(20, 30, 40, 0.95);
  border-radius: 10px;
  padding: 30px;
  color: white;
  z-index: 2000;
  display: none;
  min-width: 350px;
  text-align: center;
  max-height: 80vh;
  overflow-y: auto;  /* 允许滚动 */
}
@media (max-width: 480px) {
  #multiplayer-panel, #account-panel {
    min-width: 280px;
    padding: 20px;
    max-height: 70vh;
  }
  #multiplayer-panel input, #account-panel input {
    font-size: 16px;  /* 更大的字体，防止 iOS 缩放 */
    padding: 12px;
  }
  #multiplayer-panel button, #account-panel button {
    padding: 10px 20px;
    font-size: 16px;
    min-width: 120px;
  }
}
#multiplayer-panel { border: 2px solid #00a8ff; }
#account-panel { border: 2px solid #f1c40f; }
#multiplayer-panel h2 { color: #00a8ff; }
#account-panel h2 { color: #f1c40f; }
#multiplayer-panel input, #account-panel input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  background: #1a2a3a;
  border: 1px solid #00a8ff;
  color: white;
  border-radius: 5px;
  font-size: 18px;
}
#account-panel input { border-color: #f1c40f; }
#multiplayer-panel button, #account-panel button {
  background: #00a8ff;
  color: white;
  border: none;
  padding: 12px 24px;
  margin: 10px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 16px;
  min-width: 150px;
}
#account-panel button { background: #f1c40f; color: black; font-weight: bold; }
#multiplayer-panel button.cancel, #account-panel button.cancel { background: #e74c3c; color: white; }
#room-info {
  position: fixed;
  top: 10px;
  right: 10px;
  color: #00ff00;
  font-size: 14px;
  z-index: 1001;
  background: rgba(0,0,0,0.7);
  padding: 8px 15px;
  border-radius: 20px;
  border: 1px solid #00ff00;
  pointer-events: none;
}
#current-user {
  position: fixed;
  top: 10px;
  left: 10px;
  color: #f1c40f;
  font-size: 14px;
  z-index: 1001;
  background: rgba(0,0,0,0.7);
  padding: 8px 15px;
  border-radius: 20px;
  border: 1px solid #f1c40f;
  pointer-events: none;
  display: none;
}
/* 输入框获得焦点时，确保不被键盘完全遮挡 */
input:focus, textarea:focus {
  outline: none;
  scroll-margin-bottom: 20px;
}
</style>
<style>
  canvas {
    width: 100%;
    height: auto;
    max-width: 100%;
    display: block;
  }
</style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div id="room-info" style="display: none;"></div>
    <div id="current-user" style="display: none;"></div>

    <!-- 触屏控制 -->
    <div id="touch-controls">
      <div id="toggle-joystick">🎮</div>
      <div id="joystick-area">
        <div id="joystick-base"></div>
        <div id="joystick-knob"></div>
      </div>
      <div id="btn-area">
        <div class="touch-btn" id="btn-space">SP</div>
        <div class="touch-btn" id="btn-r">SW</div>
        <div class="touch-btn" id="btn-b">B</div>
        <div class="touch-btn" id="btn-esc">MN</div>
      </div>
    </div>
    <div id="toggle-panel">🎮</div>
    <div id="touch-hint">💡 左键摇杆移动 | 点击地面移动 | SP=展开 | SW=交换 | B=收缩 | MN=菜单</div>

    <!-- 多人游戏面板 -->
    <div id="multiplayer-panel">
        <h2>👥 多人游戏</h2>
        <div id="mp-menu">
            <button onclick="showCreateRoom()">🎮 创建房间</button>
            <button onclick="showJoinRoom()">🔑 加入房间</button>
            <button class="cancel" onclick="hideMultiplayerPanel()">❌ 返回</button>
        </div>
        <div id="mp-create" style="display: none;">
            <h3>创建房间</h3>
            <div id="room-code-display" class="room-code">------</div>
            <div id="room-link-display" class="link-box"></div>
            <button onclick="copyRoomLink()">📋 复制链接</button>
            <button class="cancel" onclick="backToMenu()">↩️ 返回</button>
        </div>
        <div id="mp-join" style="display: none;">
            <h3>加入房间</h3>
            <input type="text" id="room-code-input" placeholder="输入6位房间号" maxlength="6" inputmode="text">
            <button onclick="joinRoom()">✅ 加入</button>
            <button class="cancel" onclick="backToMenu()">↩️ 返回</button>
            <p id="join-error" style="color: #ff6b6b; margin-top: 10px;"></p>
        </div>
    </div>

    <!-- 账号面板 -->
    <div id="account-panel">
        <h2>👤 账号系统</h2>
        <div id="account-menu">
            <button onclick="showAccountLogin()">🔑 登录</button>
            <button onclick="showAccountRegister()">📝 注册</button>
            <button class="cancel" onclick="hideAccountPanel()">❌ 关闭</button>
        </div>
        <div id="account-login" style="display: none;">
            <h3>登录</h3>
            <div class="input-label">用户名</div>
            <input type="text" id="login-username" placeholder="输入用户名" maxlength="20" inputmode="text">
            <div class="input-label">密码</div>
            <div style="position: relative;">
                <input type="password" id="login-password" placeholder="输入密码" maxlength="20" style="width: 100%; padding-right: 40px;" inputmode="text">
                <span onclick="togglePasswordVisibility('login-password')" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #f1c40f; font-size: 20px;">👁️</span>
            </div>
            <button onclick="handleLogin()">✅ 登录</button>
            <button class="cancel" onclick="backToAccountMenu()">↩️ 返回</button>
            <div id="login-message" class="message" style="display: none;"></div>
        </div>
        <div id="account-register" style="display: none;">
            <h3>注册新账号</h3>
            <div class="input-label">用户名 (3-20字符)</div>
            <input type="text" id="register-username" placeholder="输入用户名" maxlength="20" inputmode="text">
            <div class="input-label">密码 (3-20字符)</div>
            <div style="position: relative;">
                <input type="password" id="register-password" placeholder="输入密码" maxlength="20" style="width: 100%; padding-right: 40px;" inputmode="text">
                <span onclick="togglePasswordVisibility('register-password')" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #f1c40f; font-size: 20px;">👁️</span>
            </div>
            <div class="input-label">确认密码</div>
            <div style="position: relative;">
                <input type="password" id="register-confirm" placeholder="再次输入密码" maxlength="20" style="width: 100%; padding-right: 40px;" inputmode="text">
                <span onclick="togglePasswordVisibility('register-confirm')" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #f1c40f; font-size: 20px;">👁️</span>
            </div>
            <button onclick="handleRegister()">📝 注册</button>
            <button class="cancel" onclick="backToAccountMenu()">↩️ 返回</button>
            <div id="register-message" class="message" style="display: none;"></div>
        </div>
        <div id="account-loggedin" style="display: none;">
            <h3>已登录</h3>
            <div id="loggedin-username" style="font-size: 24px; margin: 20px; color: #f1c40f;"></div>
            <button onclick="handleLogout()">🚪 登出</button>
            <button class="cancel" onclick="hideAccountPanel()">❌ 关闭</button>
        </div>
    </div>

    <script type="module">
    import {
      QuickSlot, Item, Inventory, StarCraftUI, RARITY_LIST, RARITY_COLORS,
      ARMOR_ELIGIBLE_ITEMS, ITEM_ARMOR_VALUES, WorldMapGame, ImageLoader,
      ProbabilityCalculator, CraftAnimation
    } from './game.js';

    let screen = null, ctx = null, gameState = 'main_menu', gameInstance = null;
    let controlsInitialized = false, animationFrameId = null;
    const GameState = { MAIN_MENU: 'main_menu', IN_GAME: 'in_game', PAUSED: 'paused', GAME_OVER: 'game_over' };
    let mouseTargetX = null, mouseTargetY = null, isMouseMoving = false;
    const MOUSE_MOVE_SPEED = 5;
    let editorMode = false;

    const imageLoader = ImageLoader.getInstance();
    window.imageLoader = imageLoader;
    window.RARITY_LIST = RARITY_LIST;
    window.RARITY_COLORS = RARITY_COLORS;

    function initDOMElements() {
      screen = document.getElementById('gameCanvas');
      if (!screen) throw new Error("Canvas not found!");

      const isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);

      if (isMobile) {
        screen.width = window.innerWidth;
        screen.height = window.innerHeight;
      } else {
        screen.width = window.innerWidth;
        screen.height = window.innerHeight;
      }

      screen.style.width = '100%';
      screen.style.height = '100%';
      screen.style.position = 'fixed';
      screen.style.top = '0';
      screen.style.left = '0';

      ctx = screen.getContext('2d');
      window.WIDTH = screen.width;
      window.HEIGHT = screen.height;

      if (gameInstance) {
        gameInstance.WIDTH = window.WIDTH;
        gameInstance.HEIGHT = window.HEIGHT;
      }
    }

    // 在 window 上添加 keyup 事件
    window.addEventListener('keyup', (e) => {
        if (e.key === 'Shift' && gameInstance && !gameInstance.paused) {
            gameInstance.player.contractMode = false;
            for (const petal of gameInstance.player.petals) {
                petal.targetRadius = 35;
            }
        }
    });

    // 窗口大小改变时重新适配
    window.addEventListener('resize', () => {
      const isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);

      if (isMobile) {
        screen.width = window.innerWidth;
        screen.height = window.innerHeight;
      } else {
        screen.width = window.innerWidth;
        screen.height = window.innerHeight;
      }

      screen.style.width = '100%';
      screen.style.height = '100%';

      window.WIDTH = screen.width;
      window.HEIGHT = screen.height;

      if (gameInstance) {
        gameInstance.WIDTH = window.WIDTH;
        gameInstance.HEIGHT = window.HEIGHT;
      }
    });

    window.URL_PARAMS = (() => {
      try { return { roomCode: new URLSearchParams(location.search).get('room') }; }
      catch(e) { return { roomCode: null }; }
    })();

    window.togglePasswordVisibility = (id) => {
      const el = document.getElementById(id);
      if (el) el.type = el.type === 'password' ? 'text' : 'password';
    };

    // ===== 触屏控制脚本 =====
    (function() {
      const isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
      const joystickArea = document.getElementById('joystick-area');
      const knob = document.getElementById('joystick-knob');
      const toggleJoystickBtn = document.getElementById('toggle-joystick');
      const togglePanelBtn = document.getElementById('toggle-panel');
      const controlsPanel = document.getElementById('touch-controls');
      const BASE_R = 70, KNOB_R = 27, CENTER = BASE_R;
      let joystickActive = false, joystickId = null, joyX = 0, joyY = 0;
      let joystickEnabled = true, panelVisible = true;

      const savedJoy = localStorage.getItem('joystickEnabled');
      if (savedJoy !== null) joystickEnabled = savedJoy === 'true';
      const savedPanel = localStorage.getItem('touchControlsVisible');
      if (savedPanel !== null) panelVisible = savedPanel === 'true';
      else panelVisible = isTouch;

      function setJoystickVisible(visible) {
        joystickEnabled = visible;
        if (visible) {
          joystickArea.classList.remove('hidden');
          toggleJoystickBtn.classList.remove('hidden-mode');
          toggleJoystickBtn.textContent = '🎮';
        } else {
          joystickArea.classList.add('hidden');
          toggleJoystickBtn.classList.add('hidden-mode');
          toggleJoystickBtn.textContent = '❌';
        }
        localStorage.setItem('joystickEnabled', visible);
      }
      function setPanelVisible(visible) {
        panelVisible = visible;
        if (visible) controlsPanel.classList.remove('hidden');
        else controlsPanel.classList.add('hidden');
        localStorage.setItem('touchControlsVisible', visible);
      }

      function updateKnob(dx, dy) {
        const dist = Math.sqrt(dx*dx+dy*dy);
        const maxDist = BASE_R - KNOB_R;
        const clamped = Math.min(dist, maxDist);
        const angle = Math.atan2(dy, dx);
        const nx = Math.cos(angle) * clamped;
        const ny = Math.sin(angle) * clamped;
        knob.style.left = (CENTER + nx - KNOB_R) + 'px';
        knob.style.top = (CENTER + ny - KNOB_R) + 'px';
        joyX = dist > 5 ? Math.cos(angle) : 0;
        joyY = dist > 5 ? Math.sin(angle) : 0;
      }
      function resetKnob() {
        knob.style.left = (CENTER - KNOB_R) + 'px';
        knob.style.top = (CENTER - KNOB_R) + 'px';
        joyX = 0; joyY = 0;
      }

      joystickArea.addEventListener('touchstart', e => {
        e.preventDefault();
        if (!joystickEnabled) return;
        const t = e.changedTouches[0];
        joystickId = t.identifier;
        joystickActive = true;
        const rect = joystickArea.getBoundingClientRect();
        updateKnob(t.clientX - rect.left - CENTER, t.clientY - rect.top - CENTER);
      }, { passive: false });
      joystickArea.addEventListener('touchmove', e => {
        e.preventDefault();
        if (!joystickEnabled || !joystickActive) return;
        for (const t of e.changedTouches) {
          if (t.identifier === joystickId) {
            const rect = joystickArea.getBoundingClientRect();
            updateKnob(t.clientX - rect.left - CENTER, t.clientY - rect.top - CENTER);
          }
        }
      }, { passive: false });
      joystickArea.addEventListener('touchend', e => {
        e.preventDefault();
        joystickActive = false;
        joystickId = null;
        resetKnob();
      }, { passive: false });

      let lastMoveTime = 0;
      function updateMovement(now) {
        if (!joystickActive || (Math.abs(joyX) < 0.1 && Math.abs(joyY) < 0.1)) {
          requestAnimationFrame(updateMovement);
          return;
        }
        if (!lastMoveTime) { lastMoveTime = now; requestAnimationFrame(updateMovement); return; }
        const dt = Math.min(0.033, (now - lastMoveTime) / 1000);
        lastMoveTime = now;
        const game = window.gameInstance;
        if (game && game.player && game.player.physicsBody) {
          const p = game.player;
          const speed = (p.speed || 80) * (p.slowMultiplier || 1);
          if (joyX !== 0 || joyY !== 0) {
            const len = Math.hypot(joyX, joyY);
            p.physicsBody.position.x += (joyX / len) * speed * dt;
            p.physicsBody.position.y += (joyY / len) * speed * dt;
          }
          const ww = window.WORLD_WIDTH || 10000, wh = window.WORLD_HEIGHT || 10000;
          p.physicsBody.position.x = Math.max(30, Math.min(ww - 30, p.physicsBody.position.x));
          p.physicsBody.position.y = Math.max(30, Math.min(wh - 30, p.physicsBody.position.y));
          if (game.cameraOffset) {
            game.cameraOffset.x = p.physicsBody.position.x - window.WIDTH / 2;
            game.cameraOffset.y = p.physicsBody.position.y - window.HEIGHT / 2;
          }
        }
        requestAnimationFrame(updateMovement);
      }
      requestAnimationFrame(updateMovement);

      function bindBtn(id, fn) {
        const el = document.getElementById(id);
        if (!el) return;
        el.addEventListener('touchstart', e => { e.preventDefault(); fn(); }, { passive: false });
        el.addEventListener('click', e => { e.preventDefault(); fn(); });
      }
      function fakeKey(key) {
        document.dispatchEvent(new KeyboardEvent('keydown', { key, bubbles: true }));
      }
      bindBtn('btn-space', () => {
        const g = window.gameInstance;
        if (g && g.player && g.player.toggleSpreadMode) g.player.toggleSpreadMode();
      });
      bindBtn('btn-r', () => {
        const g = window.gameInstance;
        if (g && g.player && g.player.quickSlot && g.player.quickSlot.swapAllSlots) g.player.quickSlot.swapAllSlots();
        else fakeKey('r');
      });
      // 🆕 B 按钮：收缩模式（Shift 键功能）
      bindBtn('btn-b', () => {
        const g = window.gameInstance;
        if (g && g.player && !g.paused) {
          g.player.contractMode = true;
          for (const petal of g.player.petals) {
            petal.targetRadius = 15;
          }
          // 0.5秒后自动恢复
          setTimeout(() => {
            if (g.player && !g.player.isDead && !g.paused) {
              g.player.contractMode = false;
              for (const petal of g.player.petals) {
                petal.targetRadius = 35;
              }
            }
          }, 500);
        }
      });
      bindBtn('btn-esc', () => {
        const g = window.gameInstance;
        if (g && g.returnToMainMenu) g.returnToMainMenu();
        else fakeKey('Escape');
      });

      toggleJoystickBtn.addEventListener('click', () => setJoystickVisible(!joystickEnabled));
      togglePanelBtn.addEventListener('click', () => setPanelVisible(!panelVisible));

      setJoystickVisible(joystickEnabled);
      setPanelVisible(panelVisible);

      const canvas = document.getElementById('gameCanvas');
      if (canvas) {
        canvas.addEventListener('touchstart', e => {
          const t = e.touches[0];
          const rect = canvas.getBoundingClientRect();
          const sx = canvas.width / rect.width, sy = canvas.height / rect.height;

        }

        const canvas = screen;
        const rect = canvas.getBoundingClientRect();

        // 计算缩放比例：canvas实际像素尺寸 / CSS显示尺寸
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;

        // 相对于canvas CSS区域的坐标
        const relativeX = (e.clientX - rect.left);
        const relativeY = (e.clientY - rect.top);

        // 转换到canvas坐标系
        const canvasX = relativeX * scaleX;
        const canvasY = relativeY * scaleY;

        // 边界检查

            y: Math.max(0, Math.min(canvas.height, canvasY))

        ctx.fillStyle = 'rgba(30,30,50,0.9)'; ctx.fillRect(0,0,400,screen.height);
        ctx.strokeStyle = 'rgba(200,200,200,0.8)'; ctx.lineWidth = 2; ctx.strokeRect(2,2,396,screen.height-4);
        drawTextWithBorder(ctx, 'INVENTORY', 200, 50, { font: 'bold 28px "Arial", sans-serif', textAlign: 'center', textBaseline: 'middle', borderWidth: 3 });
        ctx.fillStyle = '#ff6b6b'; ctx.beginPath(); ctx.arc(370,30,15,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle = 'white'; ctx.lineWidth = 2; ctx.stroke();
        drawTextWithBorder(ctx, 'X', 370,30, { font: 'bold 18px "Arial", sans-serif', textAlign: 'center', textBaseline: 'middle', borderWidth: 2, fillColor: 'white' });
        if (gameInstance.player.inventory.draw) gameInstance.player.inventory.draw(ctx);
        ctx.restore();
        if (gameInstance.player?.quickSlot?.draw) gameInstance.player.quickSlot.draw(ctx);
        drawTextWithBorder(ctx, '点击物品添加到快捷栏 | ESC: 返回游戏', 10, screen.height-10, { font: '12px "Arial", sans-serif', textAlign: 'left', textBaseline: 'bottom', borderWidth: 2 });
      }
    }

    function drawFallbackMenu(ctx) {
      ctx.fillStyle = '#1a1a2e'; ctx.fillRect(0,0,screen.width,screen.height);
      drawTextWithBorder(ctx, '🌸 flwrr 🌸', screen.width/2, screen.height/2-100, { font: '48px "Arial", sans-serif', textAlign: 'center', textBaseline: 'middle', borderWidth: 4 });
      drawTextWithBorder(ctx, 'Click to Start', screen.width/2, screen.height/2, { font: '24px "Arial", sans-serif', textAlign: 'center', textBaseline: 'middle', borderWidth: 3, fillColor: '#888' });
      const btns = [
        { text: 'Plain', y: screen.height/2+80 }, { text: 'Bio', y: screen.height/2+140 },
        { text: 'Desert', y: screen.height/2+200 }, { text: 'Random', y: screen.height/2+260 },
        { text: 'Crafting', y: screen.height/2+320 }, { text: 'Inventory', y: screen.height/2+380 },
        { text: 'MAZE MODE', y: screen.height/2+440, color: '#8B4513' }
      ];
      btns.forEach(b => {
        ctx.fillStyle = b.color || '#4a4a6a';
        const bw = 200, bh = 50, bx = screen.width/2 - bw/2;
        ctx.fillRect(bx, b.y, bw, bh);
        ctx.strokeStyle = b.color ? '#CD853F' : '#6a6a8a';
        ctx.strokeRect(bx, b.y, bw, bh);
        drawButtonTextWithBorder(ctx, b.text, bx, b.y, bw, bh, { font: 'bold 20px "Arial", sans-serif', fillColor: b.text === 'MAZE MODE' ? '#FFD700' : 'white', borderWidth: 2 });
      });
    }

    function drawTextWithBorder(ctx, txt, x, y, opt = {}) {
      const { font='24px Arial', align='center', baseline='middle', border='black', bw=3, fill='white' } = opt;
      ctx.save();
      ctx.font = font; ctx.textAlign = align; ctx.textBaseline = baseline;
      ctx.shadowColor = border; ctx.shadowBlur = bw;
      ctx.fillStyle = fill; ctx.fillText(txt, x, y);
      ctx.shadowBlur = 0; ctx.fillText(txt, x, y);
      ctx.restore();
    }
    function drawButtonTextWithBorder(ctx, txt, x, y, w, h, opt = {}) {
      drawTextWithBorder(ctx, txt, x+w/2, y+h/2, { font: opt.font || 'bold 20px Arial', align: 'center', baseline: 'middle', border: opt.borderColor || 'black', bw: opt.borderWidth || 3, fill: opt.fillColor || 'white' });
    }

    // 启动游戏
    initDOMElements();
    gameInstance = createGameInstance();
    gameLoop();
    initializePlayerControls();

    document.addEventListener('keydown', handleKeyDown);
    document.addEventListener('keyup', handleKeyUp);

    // UI 函数
    window.showMultiplayerPanel = () => { document.getElementById('multiplayer-panel').style.display = 'block'; document.getElementById('mp-menu').style.display = 'block'; document.getElementById('mp-create').style.display = 'none'; document.getElementById('mp-join').style.display = 'none'; };
    window.hideMultiplayerPanel = () => { document.getElementById('multiplayer-panel').style.display = 'none'; };
    window.showCreateRoom = async () => {
      document.getElementById('mp-menu').style.display = 'none'; document.getElementById('mp-create').style.display = 'block';
      if (!gameInstance) gameInstance = createGameInstance();
      try {
        const code = await gameInstance.createMultiplayerRoom();
        document.getElementById('room-code-display').textContent = code;
        document.getElementById('room-link-display').textContent = `${location.href.split('?')[0]}?room=${code}`;
        const ri = document.getElementById('room-info');
        if (ri) { ri.style.display = 'block'; ri.innerHTML = `🎮 房间: ${code} | 等待玩家加入...`; }
      } catch(e) { alert('创建房间失败: ' + e.message); backToMenu(); }
    };
    window.showJoinRoom = () => { document.getElementById('mp-menu').style.display = 'none'; document.getElementById('mp-join').style.display = 'block'; document.getElementById('room-code-input').focus(); };
    window.backToMenu = () => { document.getElementById('mp-menu').style.display = 'block'; document.getElementById('mp-create').style.display = 'none'; document.getElementById('mp-join').style.display = 'none'; document.getElementById('join-error').textContent = ''; };
    window.copyRoomLink = () => { navigator.clipboard.writeText(document.getElementById('room-link-display').textContent); alert('✅ 链接已复制！'); };
    window.joinRoom = async () => {
      const code = document.getElementById('room-code-input').value.toUpperCase();
      if (code.length < 4) { document.getElementById('join-error').textContent = '请输入有效的房间号'; return; }
      if (!gameInstance) gameInstance = createGameInstance();
      try {
        await gameInstance.joinMultiplayerRoom(code);
        hideMultiplayerPanel();
        const ri = document.getElementById('room-info');
        if (ri) { ri.style.display = 'block'; ri.innerHTML = `🎮 房间: ${code} | 已加入`; }
        startGame('Plain');
      } catch(e) { document.getElementById('join-error').textContent = '加入失败: ' + e.message; }
    };
    window.showAccountPanel = () => { document.getElementById('account-panel').style.display = 'block'; document.getElementById('account-menu').style.display = 'block'; document.getElementById('account-login').style.display = 'none'; document.getElementById('account-register').style.display = 'none'; document.getElementById('account-loggedin').style.display = 'none'; clearAccountMessages(); if(gameInstance?.accountSystem?.isLoggedIn()) showLoggedInStatus(); };
    window.hideAccountPanel = () => { document.getElementById('account-panel').style.display = 'none'; clearAccountMessages(); };
    window.showAccountLogin = () => { document.getElementById('account-menu').style.display = 'none'; document.getElementById('account-login').style.display = 'block'; document.getElementById('account-register').style.display = 'none'; document.getElementById('account-loggedin').style.display = 'none'; clearAccountMessages(); document.getElementById('login-username').value = ''; document.getElementById('login-password').value = ''; };
    window.showAccountRegister = () => { document.getElementById('account-menu').style.display = 'none'; document.getElementById('account-login').style.display = 'none'; document.getElementById('account-register').style.display = 'block'; document.getElementById('account-loggedin').style.display = 'none'; clearAccountMessages(); document.getElementById('register-username').value = ''; document.getElementById('register-password').value = ''; document.getElementById('register-confirm').value = ''; };
    window.backToAccountMenu = () => { document.getElementById('account-menu').style.display = 'block'; document.getElementById('account-login').style.display = 'none'; document.getElementById('account-register').style.display = 'none'; document.getElementById('account-loggedin').style.display = 'none'; clearAccountMessages(); };
    window.showLoggedInStatus = () => {
      if (!gameInstance?.accountSystem) return;
      const un = gameInstance.accountSystem.getCurrentUser();
      document.getElementById('loggedin-username').textContent = un;
      document.getElementById('account-menu').style.display = 'none';
      document.getElementById('account-login').style.display = 'none';
      document.getElementById('account-register').style.display = 'none';
      document.getElementById('account-loggedin').style.display = 'block';
      const ud = document.getElementById('current-user');
      if (ud) { ud.style.display = 'block'; ud.innerHTML = `👤 ${un}`; }
    };
    window.handleLogin = () => {
      const un = document.getElementById('login-username').value.trim();
      const pw = document.getElementById('login-password').value.trim();
      if (!un || !pw) { showAccountMessage('login-message', '请输入用户名和密码', 'error'); return; }
      if (!gameInstance?.accountSystem) { showAccountMessage('login-message', '游戏系统未初始化', 'error'); return; }
      const res = gameInstance.accountSystem.login(un, pw);
      if (res.success) {
        showAccountMessage('login-message', '登录成功！', 'success');
        if (res.gameData) gameInstance.accountSystem.applyGameData(gameInstance.player, res.gameData);
        setTimeout(() => { hideAccountPanel(); showLoggedInStatus(); }, 1500);
      } else showAccountMessage('login-message', res.message, 'error');
    };
    window.handleRegister = () => {
      const un = document.getElementById('register-username').value.trim();
      const pw = document.getElementById('register-password').value.trim();
      const cf = document.getElementById('register-confirm').value.trim();
      if (!un || !pw || !cf) { showAccountMessage('register-message', '请填写所有字段', 'error'); return; }
      if (pw !== cf) { showAccountMessage('register-message', '两次输入的密码不一致', 'error'); return; }
      if (un.length < 3 || un.length > 20) { showAccountMessage('register-message', '用户名长度必须在3-20字符之间', 'error'); return; }
      if (pw.length < 3 || pw.length > 20) { showAccountMessage('register-message', '密码长度必须在3-20字符之间', 'error'); return; }
      if (!gameInstance?.accountSystem) { showAccountMessage('register-message', '游戏系统未初始化', 'error'); return; }
      const res = gameInstance.accountSystem.createAccount(un, pw);
      if (res.success) {
        showAccountMessage('register-message', '注册成功！请登录', 'success');
        setTimeout(() => showAccountLogin(), 1500);
      } else showAccountMessage('register-message', res.message, 'error');
    };
    window.handleLogout = () => {
      if (!gameInstance?.accountSystem) return;
      gameInstance.accountSystem.logout();
      document.getElementById('current-user').style.display = 'none';
      backToAccountMenu();
      showAccountMessage('login-message', '已登出', 'success');
    };
    function showAccountMessage(eid, msg, type) {
      const el = document.getElementById(eid);
      if (!el) return;
      el.textContent = msg;
      el.className = `message ${type}`;
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; }, 3000);
    }
    function clearAccountMessages() {
      const lm = document.getElementById('login-message');
      const rm = document.getElementById('register-message');
      if (lm) { lm.style.display = 'none'; lm.textContent = ''; }
      if (rm) { rm.style.display = 'none'; rm.textContent = ''; }
    }
    </script>
</body>
</html>
